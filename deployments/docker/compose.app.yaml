networks:
    default:

services:
    gateway-controller:
        container_name: merionyx-api-gateway-controller
        build:
            context: ../..
            dockerfile: Dockerfile.controller
        environment:
            - CONFIG_PATH=./configs/controller/config.yaml
            - SSH_KNOWN_HOSTS=/app/secrets/known_hosts
        env_file:
            - ../../secrets/.env
        ports:
            - 10080:8080
            - 10443:8443
            - 19090:19090
            - 19091:19091
        networks:
            - default
        depends_on:
            - etcd
        volumes:
          - ../../../api-gateway-schemas-local:/app/local-dir
    gateway-api-server:
        container_name: merionyx-api-gateway-api-server
        build:
            context: ../..
            dockerfile: Dockerfile.api-server
        environment:
            - CONFIG_PATH=./configs/api-server/config.yaml
            - SSH_KNOWN_HOSTS=/app/secrets/known_hosts
        env_file:
            - ../../secrets/.env
        ports:
            - 11080:8080
            - 11443:8443
        healthcheck:
          test: ["CMD", "curl", "-f", "http://localhost:8080/.well-known/jwks.json"]
          interval: 30s
          timeout: 10s
          retries: 3
          start_period: 40s
        networks:
            - default
        depends_on:
            - etcd
        volumes:
          - ../../../api-gateway-api-server-local:/app/local-dir
