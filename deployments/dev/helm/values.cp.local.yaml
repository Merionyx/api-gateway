# Local test of control plane.
# Example installation (release local-cp, NS api-gateway), from repo root:
#   helm upgrade --install local-cp ./deployments/helm/api-gateway-control-plane -n api-gateway --create-namespace -f ./deployments/dev/helm/values.cp.local.yaml
#
# To apply the same file to an existing release (e.g. after editing this file):
#   helm upgrade local-cp ./deployments/helm/api-gateway-control-plane -n api-gateway -f ./deployments/dev/helm/values.cp.local.yaml
#
# Important: Secrets are mounted only from the SAME namespace as the release (here api-gateway).
# If etcd-client-tls is in another namespace (e.g. etcd), copy it to api-gateway:
# kubectl get secret etcd-client-tls -n default -o yaml \
#   | sed '/^  uid:/d;/^  resourceVersion:/d;/^  creationTimestamp:/d' \
#   | sed 's/^  namespace: etcd$/  namespace: api-gateway/' \
#   | kubectl apply -f -
# (substitute etcd with the namespace where the original Secret is located)
#
# Also in api-gateway must be: api-gateway-jwt-api-keys, api-gateway-jwt-edge-keys, api-gateway-session-kek, api-gateway-contract-syncer (if used below).
#
# OIDC + session KEK: see deployments/dev/kubernetes/examples/cp-local-oidc-secrets.md
# OAuth client_id / client_secret: prefer Kubernetes Secret → components.apiServer.oidcProviderCredentials (see examples).

namespace: api-gateway

# OTLP в Jaeger all-in-one из deployments/dev/kubernetes/manifests/telemetry
# (Service jaeger, namespace default, порт 4317 — см. jaeger-service.yaml).

telemetry:
  enabled: true
  otlp_endpoint: "http://jaeger.default.svc.cluster.local:4317"
  otlp_insecure: true
  otlp_protocol: grpc

# Convenient for images from docker load / kind load:
global:
  imagePullSecrets: []

certManager:
  createCertificates: true
  # CA → Issuer in namespace → leaf certs; creates Secret ...-grpc-internal-ca-tls for mTLS.
  useNamespaceCAChain: true
  issuerRef:
    kind: ClusterIssuer
    name: selfsigned

components:
  controller:
    image:
      pullPolicy: IfNotPresent
    tenant: dev-cluster

  apiServer:
    image:
      pullPolicy: IfNotPresent
    jwt:
      # Two Secrets (API vs Edge signing keys). See deployments/dev/kubernetes/examples/generate-edge-jwt-key.sh and cp-local-oidc-secrets.md.
      apiKeysSecret: api-gateway-jwt-api-keys
      edgeKeysSecret: api-gateway-jwt-edge-keys
    # Session KEK: 32 raw bytes as standard base64 in Secret key `kek` (never commit real value in git).
    sessionKek:
      existingSecret: api-gateway-session-kek
      secretKey: kek
    # OIDC OAuth credentials from Secret (env AGWCP_OIDC_*); keys must match auth.oidc_providers[].id below.
    oidcProviderCredentials:
      github:
        secretName: api-gateway-oidc-oauth
        clientIdKey: github_client_id
        clientSecretKey: github_client_secret
      gitlab:
        secretName: api-gateway-oidc-oauth
        clientIdKey: gitlab_client_id
        clientSecretKey: gitlab_client_secret
      google:
        secretName: api-gateway-oidc-oauth
        clientIdKey: google_client_id
        clientSecretKey: google_client_secret
    # Merged into API Server config (snake_case). client_id / client_secret may be empty when using oidcProviderCredentials.
    # Public HTTP base (NodePort / LB): used in CORS + OIDC redirect_uri_allowlist for browser / Postman.
    config:
      server:
        cors:
          allow_origins:
          - "http://185.41.122.122:30100"
          - "http://127.0.0.1:21987"
          - "http://localhost:21987"
      jwt:
        # kid = basename of *.key without extension; pin which key signs when several exist (rotation).
        api_signing_kid: api-server-key-2026-04-23
        edge_signing_kid: edge-server-key-2026-04-23
      auth:
        environment: development

        interactive_access_token_ttl: "5m"
        interactive_access_token_max_ttl: "168h"
        interactive_refresh_token_ttl: "168h"
        interactive_refresh_token_max_ttl: "720h"

        oidc_providers:
        - id: github
          name: GitHub
          kind: github
          issuer: https://github.com/login/oauth
          client_id: ""
          client_secret: ""
          redirect_uri_allowlist:
          # agwctl default
          - "http://127.0.0.1:21987/callback"
          # Browser / Postman: IdP redirects here with ?code=&state= (must match GitHub/Google/GitLab app settings)
          - "http://185.41.122.122:30100/api/v1/auth/oidc/callback"
          - "http://elg.mikhailminaev.com:30100/api/v1/auth/oidc/callback"
          # Postman OAuth 2.0 (Get New Access Token) helper
          - "https://oauth.pstmn.io/v1/callback"
          github:
            allowed_org_logins:
            - "merionyx"
            team_role_bindings:
            - org: "merionyx"
              team_slug: "maintainers"
              roles:
              - "api:role:admin"
        - id: gitlab
          name: GitLab
          kind: gitlab
          # Self-managed: set issuer to https://gitlab.example.com (no path after host)
          issuer: https://gitlab.com
          client_id: ""
          client_secret: ""
          redirect_uri_allowlist:
          - "http://127.0.0.1:21987/callback"
          - "http://185.41.122.122:30100/api/v1/auth/oidc/callback"
          - "http://elg.mikhailminaev.com:30100/api/v1/auth/oidc/callback"
          - "https://oauth.pstmn.io/v1/callback"
        - id: google
          name: Google
          kind: google
          issuer: https://accounts.google.com
          client_id: ""
          client_secret: ""
          redirect_uri_allowlist:
          - "http://127.0.0.1:21987/callback"
          - "http://185.41.122.122:30100/api/v1/auth/oidc/callback"
          - "http://elg.mikhailminaev.com:30100/api/v1/auth/oidc/callback"
          - "https://oauth.pstmn.io/v1/callback"
          # Optional: restrict to Workspace / domains (remove or edit for your tenant)
          # google:
          #   allowed_hosted_domains: ["yourcompany.com"]
          #   allowed_email_domains: ["gmail.com"]

  contractSyncer:
    image:
      pullPolicy: IfNotPresent
    # A: one Secret with all keys (as now).
    # envFromSecret: api-gateway-contract-syncer
    # B: one Secret per repository — set repositoryTokens and remove/clear envFromSecret.
    # In config.repositories[].auth.token_env, use the same name as envName:
    # repositoryTokens:
    #   - envName: GIT_TOKEN_SCHEMAS
    #     secretName: git-token-<repository-name>
    #     secretKey: token
    repositoryTokens:
    - envName: GITHUB_ACCESS_TOKEN
      secretName: git-token
      secretKey: token
    config:
      repositories:
      - name: api-gateway-schemas-https
        source: git
        url: "https://github.com/MikhailMinaev/api-gateway-schemas.git"
        auth:
          type: token
          token_env: GITHUB_ACCESS_TOKEN

etcd:
  endpoints:
  # Example for etcd in the same namespace (substitute with your Service/host:port):
  - "https://etcd-0.etcd.default.svc.cluster.local:2379"
  - "https://etcd-1.etcd.default.svc.cluster.local:2379"
  - "https://etcd-2.etcd.default.svc.cluster.local:2379"
  tls:
    existingSecret: etcd-client-tls
