# Same chart as values.edge.dev.yaml; example upgrade from repo root:
#   helm upgrade <release-name> ./deployments/helm/api-gateway-edge -n api-gateway -f ./deployments/dev/helm/values.edge.dyn-qa.yaml
#
# Jaeger: deployments/dev/kubernetes/manifests/telemetry (default/jaeger:4317).

telemetry:
  enabled: true
  otlp_endpoint: "http://jaeger.default.svc.cluster.local:4317"
  otlp_insecure: true
  otlp_protocol: grpc

connectivity:
  envoyNodeId: envoy-dyn-qa
  controllerGrpcAddress: local-cp-api-gateway-controller:19090
  controllerServerName: local-cp-api-gateway-controller.api-gateway.svc.cluster.local
  jwksUrl: http://local-cp-api-gateway-api-server:8080/.well-known/jwks.json
  environment: dyn-qa
  tenant: dev-cluster
  xdsHost: local-cp-api-gateway-controller
  xdsPort: 19091
  xdsSni: local-cp-api-gateway-controller.api-gateway.svc.cluster.local

tls:
  internalCASecret: local-cp-api-gateway-grpc-internal-ca-tls

certManager:
  createCertificates: true
  issuerRef:
    kind: Issuer
    name: local-cp-api-gateway-grpc-ca-issuer

envoy:
  image:
    pullPolicy: IfNotPresent
  tracing:
    enabled: true
    inheritCollectorFromTelemetry: true

sidecar:
  image:
    pullPolicy: IfNotPresent
