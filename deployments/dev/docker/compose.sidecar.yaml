networks:
  default:
  dev-network:
    external: true
  prod-network:
    external: true

services:
  auth-sidecar-dev:
    build:
      context: ../../..
      dockerfile: build/release/Dockerfile
      args:
        SERVICE: auth-sidecar
        OCI_NAME: "Auth Sidecar"
    container_name: auth-sidecar-dev
    ports:
      - "9101:9001"
    environment:
      - CONFIG_PATH=./configs/auth-sidecar/config.dev.yaml
      - AUTH_SIDECAR_CONTROLLER_ADDRESS=gateway-controller-dev:19090
      - AUTH_SIDECAR_CONTROLLER_ENVIRONMENT=dev
      - AUTH_SIDECAR_JWT_JWKS_URL=http://api-server:8080/.well-known/jwks.json
    networks:
      default:
      dev-network:
        aliases:
          - auth-sidecar
    depends_on:
      - gateway-controller-dev
      - gateway-api-server
    restart: unless-stopped
  auth-sidecar-prod:
    build:
      context: ../../..
      dockerfile: build/release/Dockerfile
      args:
        SERVICE: auth-sidecar
        OCI_NAME: "Auth Sidecar"
    container_name: auth-sidecar-prod
    ports:
      - "9102:9001"
    environment:
      - CONFIG_PATH=./configs/auth-sidecar/config.prod.yaml
      - AUTH_SIDECAR_CONTROLLER_ADDRESS=gateway-controller-prod:19090
      - AUTH_SIDECAR_CONTROLLER_ENVIRONMENT=dev
      - AUTH_SIDECAR_JWT_JWKS_URL=http://api-server:8080/.well-known/jwks.json
    networks:
      default:
      prod-network:
        aliases:
          - auth-sidecar
    depends_on:
      - gateway-controller-prod
      - gateway-api-server
    restart: unless-stopped
