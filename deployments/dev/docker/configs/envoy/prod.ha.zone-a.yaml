node:
  id: envoy-prod
  cluster: prod-cluster
  locality:
    zone: zone-a

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9902

dynamic_resources:
  ads_config:
    api_type: GRPC
    transport_api_version: V3
    grpc_services:
    - envoy_grpc:
        cluster_name: xds_cluster
  cds_config:
    resource_api_version: V3
    ads: {}
  lds_config:
    resource_api_version: V3
    ads: {}

static_resources:
  clusters:
  - name: xds_cluster
    type: STRICT_DNS
    connect_timeout: 1s
    lb_policy: ROUND_ROBIN
    common_lb_config:
      locality_weighted_lb_config: {}
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options: {}
    load_assignment:
      cluster_name: xds_cluster
      endpoints:
      - locality:
          zone: zone-a
        load_balancing_weight: 1
        lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: gateway-controller-prod-1
                port_value: 19091
      - locality:
          zone: zone-b
        load_balancing_weight: 1
        lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: gateway-controller-prod-2
                port_value: 19091
      - locality:
          zone: zone-c
        load_balancing_weight: 1
        lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: gateway-controller-prod-3
                port_value: 19091
