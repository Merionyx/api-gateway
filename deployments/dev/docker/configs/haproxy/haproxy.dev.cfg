# HA dev: TCP sticky (balance source) for gRPC streams; HTTP round-robin for JWKS.
global
    log stdout format raw local0 info
    maxconn 4000

defaults
    log global
    mode tcp
    option tcplog
    timeout connect 10s
    timeout client  3600s
    timeout server  3600s
    retries 2

# API Server gRPC (ControllerRegistry / snapshots)
frontend fe_api_grpc
    bind *:19093
    default_backend be_api_grpc

backend be_api_grpc
    balance source
    server s1 gateway-api-server-1:19093 check inter 5s fall 3 rise 2
    server s2 gateway-api-server-2:19093 check inter 5s fall 3 rise 2
    server s3 gateway-api-server-3:19093 check inter 5s fall 3 rise 2

# API Server HTTP (JWKS, health)
listen api_http
    bind *:8080
    mode http
    option httplog
    balance roundrobin
    timeout client  120s
    timeout server  120s
    server h1 gateway-api-server-1:8080 check inter 5s fall 3 rise 2
    server h2 gateway-api-server-2:8080 check inter 5s fall 3 rise 2
    server h3 gateway-api-server-3:8080 check inter 5s fall 3 rise 2

# Gateway Controller dev — gRPC (sidecar / admin)
listen ctrl_dev_grpc
    bind *:39090
    mode tcp
    balance source
    server c1 gateway-controller-dev-1:19090 check inter 5s fall 3 rise 2
    server c2 gateway-controller-dev-2:19090 check inter 5s fall 3 rise 2
    server c3 gateway-controller-dev-3:19090 check inter 5s fall 3 rise 2

# Gateway Controller prod — gRPC
listen ctrl_prod_grpc
    bind *:49090
    mode tcp
    balance source
    server p1 gateway-controller-prod-1:19090 check inter 5s fall 3 rise 2
    server p2 gateway-controller-prod-2:19090 check inter 5s fall 3 rise 2
    server p3 gateway-controller-prod-3:19090 check inter 5s fall 3 rise 2
