# Example: OAuth client id/secret for OIDC providers (GitHub, GitLab, Google, etc.).
# Apply in the same namespace as the API Server (e.g. api-gateway).
#
#   kubectl apply -f secret-api-gateway-oidc-oauth.example.yaml
#
# Helm (values.cp.local.yaml) maps these keys to env vars via
# components.apiServer.oidcProviderCredentials — do not put these values in ConfigMap.

apiVersion: v1
kind: Secret
metadata:
  name: api-gateway-oidc-oauth
  namespace: api-gateway
type: Opaque
stringData:
  github_client_id: "REPLACE_WITH_GITHUB_OAUTH_APP_CLIENT_ID"
  github_client_secret: "REPLACE_WITH_GITHUB_OAUTH_APP_CLIENT_SECRET"
  gitlab_client_id: "REPLACE_WITH_GITLAB_OAUTH_APP_CLIENT_ID"
  gitlab_client_secret: "REPLACE_WITH_GITLAB_OAUTH_APP_CLIENT_SECRET"
  google_client_id: "REPLACE_WITH_GOOGLE_OAUTH_CLIENT_ID"
  google_client_secret: "REPLACE_WITH_GOOGLE_OAUTH_CLIENT_SECRET"
