# Jaeger v2 all-in-one (in-memory). Image aligned with deployments/dev/docker/compose.jaeger.yaml.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: default
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/part-of: api-gateway-dev
    app.kubernetes.io/component: tracing
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: jaeger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jaeger
        app.kubernetes.io/part-of: api-gateway-dev
        app.kubernetes.io/component: tracing
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/jaeger:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: ui
              containerPort: 16686
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: agent-config
              containerPort: 5778
            - name: zipkin
              containerPort: 9411
          readinessProbe:
            httpGet:
              path: /
              port: ui
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: ui
            initialDelaySeconds: 15
            periodSeconds: 20
