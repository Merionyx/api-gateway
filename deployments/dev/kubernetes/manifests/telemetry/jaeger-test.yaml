apiVersion: batch/v1
kind: Job
metadata:
  name: jaeger-otlp-smoke
  namespace: default
spec:
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: telemetrygen
        image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:latest
        args:
        - traces
        - --otlp-insecure
        - --otlp-endpoint=jaeger:4317
        - --traces=5
