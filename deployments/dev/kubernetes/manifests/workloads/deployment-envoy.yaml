apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy-dev
  namespace: default
  labels:
    app.kubernetes.io/name: envoy-dev
    app.kubernetes.io/part-of: api-gateway-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: envoy-dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: envoy-dev
    spec:
      hostAliases:
      - ip: 127.0.0.1
        hostnames:
        - sidecar
      containers:
      - name: envoy
        image: envoyproxy/envoy:v1.33-latest
        imagePullPolicy: IfNotPresent
        args:
        - -c
        - /etc/envoy/envoy.yaml
        ports:
        - name: proxy
          containerPort: 10000
        - name: admin
          containerPort: 9901
        volumeMounts:
        - name: envoy-config
          mountPath: /etc/envoy/envoy.yaml
          subPath: envoy.xds-tls.yaml
          readOnly: true
        - name: grpc-internal-ca
          mountPath: /etc/grpc-internal-ca
          readOnly: true
        - name: grpc-xds-client-tls
          mountPath: /etc/grpc-xds-client-tls
          readOnly: true
      - name: sidecar
        image: merionyx/api-gateway-sidecar:latest
        imagePullPolicy: Never
        env:
        - name: CONFIG_PATH
          value: /sidecar/config/k8s.yaml
        ports:
        - name: grpc
          containerPort: 9001
        - name: metrics
          containerPort: 9090
        volumeMounts:
        - name: sidecar-config
          mountPath: /sidecar/config/k8s.yaml
          subPath: sidecar.yaml
          readOnly: true
        - name: grpc-ext-authz-tls
          mountPath: /etc/grpc-ext-authz-tls
          readOnly: true
        - name: grpc-client-controller-tls
          mountPath: /etc/grpc-client-controller
          readOnly: true
        - name: grpc-internal-ca
          mountPath: /etc/grpc-internal-ca
          readOnly: true
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1001
          runAsGroup: 1001
      volumes:
      - name: envoy-config
        configMap:
          name: api-gateway-dev-envoy
      - name: grpc-internal-ca
        secret:
          secretName: api-gateway-grpc-ca-tls
      - name: grpc-xds-client-tls
        secret:
          secretName: grpc-client-envoy-tls
      - name: sidecar-config
        configMap:
          name: api-gateway-dev-apps-config
      - name: grpc-ext-authz-tls
        secret:
          secretName: sidecar-grpc-tls
      - name: grpc-client-controller-tls
        secret:
          secretName: grpc-client-sidecar-tls
