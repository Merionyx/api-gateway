apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy-dev
  namespace: default
  labels:
    app.kubernetes.io/name: envoy-dev
    app.kubernetes.io/part-of: api-gateway-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: envoy-dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: envoy-dev
    spec:
      hostAliases:
      - ip: 127.0.0.1
        hostnames:
        - auth-sidecar
      containers:
      - name: envoy
        image: envoyproxy/envoy:v1.33-latest
        imagePullPolicy: IfNotPresent
        args:
        - -c
        - /etc/envoy/envoy.yaml
        ports:
        - name: proxy
          containerPort: 10000
        - name: admin
          containerPort: 9901
        volumeMounts:
        - name: envoy-config
          mountPath: /etc/envoy/envoy.yaml
          subPath: envoy.yaml
          readOnly: true
      - name: auth-sidecar
        image: merionyx/api-gateway-auth-sidecar:latest
        imagePullPolicy: Always
        env:
        - name: CONFIG_PATH
          value: /auth-sidecar/config/k8s.yaml
        ports:
        - name: grpc
          containerPort: 9001
        volumeMounts:
        - name: auth-sidecar-config
          mountPath: /auth-sidecar/config/k8s.yaml
          subPath: auth-sidecar.yaml
          readOnly: true
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1001
          runAsGroup: 1001
      volumes:
      - name: envoy-config
        configMap:
          name: api-gateway-dev-envoy
      - name: auth-sidecar-config
        configMap:
          name: api-gateway-dev-apps-config
