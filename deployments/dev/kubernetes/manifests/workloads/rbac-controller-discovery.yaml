# RBAC for kubernetes_discovery in controller: list namespaces, CR gateway.merionyx.com, Services.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway-controller
  namespace: default
  labels:
    app.kubernetes.io/name: gateway-controller-dev
    app.kubernetes.io/part-of: api-gateway-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: api-gateway-controller-k8s-discovery
  labels:
    app.kubernetes.io/part-of: api-gateway-dev
rules:
- apiGroups: [ "" ]
  resources: [ "namespaces" ]
  verbs: [ "list", "get", "watch" ]
- apiGroups: [ "" ]
  resources: [ "services" ]
  verbs: [ "list", "get", "watch" ]
- apiGroups: [ "gateway.merionyx.com" ]
  resources: [ "environments", "contractbundles", "gatewayupstreams" ]
  verbs: [ "list", "get", "watch" ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: api-gateway-controller-k8s-discovery
  labels:
    app.kubernetes.io/part-of: api-gateway-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: api-gateway-controller-k8s-discovery
subjects:
- kind: ServiceAccount
  name: api-gateway-controller
  namespace: default
