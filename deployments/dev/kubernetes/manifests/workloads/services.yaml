apiVersion: v1
kind: Service
metadata:
  name: gateway-api-server
  namespace: default
  labels:
    app.kubernetes.io/name: gateway-api-server
    app.kubernetes.io/part-of: api-gateway-dev
spec:
  selector:
    app.kubernetes.io/name: gateway-api-server
  ports:
  - name: http
    port: 8080
    targetPort: http
  - name: grpc
    port: 19093
    targetPort: grpc
---
apiVersion: v1
kind: Service
metadata:
  name: api-server-nodeport
  namespace: default
  labels:
    app.kubernetes.io/name: api-server-nodeport
    app.kubernetes.io/part-of: api-gateway-dev
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: gateway-api-server
  ports:
  - name: http
    port: 8080
    targetPort: http
    nodePort: 30100
  - name: grpc
    port: 19093
    targetPort: grpc
    nodePort: 30101
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-contract-syncer
