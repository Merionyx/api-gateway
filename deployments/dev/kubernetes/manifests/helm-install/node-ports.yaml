apiVersion: v1
kind: Service
metadata:
  name: api-server-nodeport
  namespace: api-gateway
  labels:
    app.kubernetes.io/name: api-server-nodeport
    app.kubernetes.io/part-of: api-gateway-dev
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: local-cp-api-gateway-control-plane-api-server
  ports:
  - name: http
    port: 8080
    targetPort: http
    nodePort: 30100
  - name: grpc
    port: 19093
    targetPort: grpc
    nodePort: 30101
---
apiVersion: v1
kind: Service
metadata:
  name: envoy-dev-nodeport
  namespace: api-gateway
  labels:
    app.kubernetes.io/name: envoy-dev-nodeport
    app.kubernetes.io/part-of: api-gateway-dev
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: edge-dev-api-gateway-edge-edge
  ports:
  - name: proxy
    port: 10000
    targetPort: proxy
    nodePort: 30000
  - name: admin
    port: 9901
    targetPort: admin
    nodePort: 30001
---
apiVersion: v1
kind: Service
metadata:
  name: envoy-dyn-qa-nodeport
  namespace: api-gateway
