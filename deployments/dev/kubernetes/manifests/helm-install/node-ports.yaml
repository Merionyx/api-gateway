    app.kubernetes.io/part-of: api-gateway-dev
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: edge-dyn-qa-api-gateway-edge-edge
  ports:
  - name: proxy
    port: 10000
    targetPort: proxy
    nodePort: 30010
  - name: admin
    port: 9901
    targetPort: admin
    nodePort: 30011
