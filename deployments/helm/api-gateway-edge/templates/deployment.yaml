apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agwedge.fullname" . }}-gateway
  labels:
    {{- include "agwedge.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "agwedge.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agwedge.selectorLabels" . | nindent 8 }}
      {{- $podAnn := mergeOverwrite (.Values.envoy.podAnnotations | default dict) (.Values.sidecar.podAnnotations | default dict) }}
      annotations:
        checksum/envoy-configmap: {{ include "agwedge.envoy.bootstrapYaml" . | sha256sum }}
        checksum/auth-configmap: {{ include "agwedge.auth.config.merged" . | sha256sum }}
        {{- if $podAnn }}
        {{- toYaml $podAnn | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.sidecar.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: envoy
        image: {{ printf "%s:%s" .Values.envoy.image.repository .Values.envoy.image.tag | quote }}
        imagePullPolicy: {{ .Values.envoy.image.pullPolicy }}
        args:
        - -c
        - /etc/envoy/envoy.yaml
        ports:
        - name: proxy
          containerPort: 10000
        - name: admin
          containerPort: 9901
        volumeMounts:
        - name: envoy-config
          mountPath: /etc/envoy/envoy.yaml
          subPath: envoy.xds-tls.yaml
          readOnly: true
        - name: grpc-internal-ca
          mountPath: /etc/grpc-internal-ca
          readOnly: true
        - name: grpc-xds-client-tls
          mountPath: /etc/grpc-xds-client-tls
          readOnly: true
        {{- with .Values.envoy.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      - name: sidecar
        image: {{ include "agwedge.sidecarImage" . | quote }}
        imagePullPolicy: {{ .Values.sidecar.image.pullPolicy }}
        env:
        - name: CONFIG_PATH
          value: /sidecar/config/k8s.yaml
        ports:
        - name: grpc
          containerPort: 9001
        - name: metrics
          containerPort: 9090
        volumeMounts:
        - name: sidecar-config
          mountPath: /sidecar/config/k8s.yaml
          subPath: sidecar.yaml
          readOnly: true
        - name: grpc-ext-authz-tls
          mountPath: /etc/grpc-ext-authz-tls
          readOnly: true
        - name: grpc-client-controller-tls
          mountPath: /etc/grpc-client-controller
          readOnly: true
        - name: grpc-internal-ca
          mountPath: /etc/grpc-internal-ca
          readOnly: true
        {{- with .Values.sidecar.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1001
          runAsGroup: 1001
      volumes:
      - name: envoy-config
        configMap:
          name: {{ include "agwedge.fullname" . }}-envoy
      - name: grpc-internal-ca
        secret:
          secretName: {{ include "agwedge.secret.internalCA" . }}
      - name: grpc-xds-client-tls
        secret:
          secretName: {{ include "agwedge.secret.grpcClientEnvoy" . }}
      - name: sidecar-config
        configMap:
          name: {{ include "agwedge.fullname" . }}-auth
      - name: grpc-ext-authz-tls
        secret:
          secretName: {{ include "agwedge.secret.sidecarGrpc" . }}
      - name: grpc-client-controller-tls
        secret:
          secretName: {{ include "agwedge.secret.grpcClientsidecar" . }}
      {{- $nsel := mergeOverwrite (.Values.envoy.nodeSelector | default dict) (.Values.sidecar.nodeSelector | default dict) }}
      {{- if $nsel }}
      nodeSelector:
        {{- toYaml $nsel | nindent 8 }}
      {{- end }}
      {{- $tol := concat (.Values.envoy.tolerations | default list) (.Values.sidecar.tolerations | default list) }}
      {{- if $tol }}
      tolerations:
        {{- toYaml $tol | nindent 8 }}
      {{- end }}
      {{- if or .Values.envoy.affinity .Values.sidecar.affinity (and .Values.defaultPodAntiAffinity (gt (int .Values.replicaCount) 1)) }}
      affinity:
        {{- if .Values.envoy.affinity }}
        {{- toYaml .Values.envoy.affinity | nindent 8 }}
        {{- else if .Values.sidecar.affinity }}
        {{- toYaml .Values.sidecar.affinity | nindent 8 }}
        {{- else }}
        {{- include "agwedge.defaultAntiAffinity" . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- if or .Values.envoy.topologySpreadConstraints .Values.sidecar.topologySpreadConstraints (and .Values.defaultTopologySpreadConstraints (gt (int .Values.replicaCount) 1)) }}
      topologySpreadConstraints:
        {{- if .Values.envoy.topologySpreadConstraints }}
        {{- toYaml .Values.envoy.topologySpreadConstraints | nindent 8 }}
        {{- else if .Values.sidecar.topologySpreadConstraints }}
        {{- toYaml .Values.sidecar.topologySpreadConstraints | nindent 8 }}
        {{- else }}
        {{- include "agwedge.defaultTopologySpread" . | nindent 8 }}
        {{- end }}
      {{- end }}
