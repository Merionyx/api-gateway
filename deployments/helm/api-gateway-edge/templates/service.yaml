apiVersion: v1
kind: Service
metadata:
  name: {{ include "agwedge.fullname" . }}-gateway
  labels:
    {{- include "agwedge.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "agwedge.selectorLabels" . | nindent 4 }}
  ports:
  - name: proxy
    port: 10000
    targetPort: proxy
  - name: admin
    port: 9901
    targetPort: admin
  - name: metrics
    port: 9090
    targetPort: metrics
