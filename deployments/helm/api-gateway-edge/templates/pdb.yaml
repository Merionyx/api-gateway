{{- if and .Values.envoy.pdb.enabled (gt (int .Values.replicaCount) 1) }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "agwedge.fullname" . }}-gateway
  labels:
    {{- include "agwedge.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.envoy.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "agwedge.selectorLabels" . | nindent 6 }}
{{- end }}
