{{- if .Values.components.controller.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "agwcp.fullname" . }}-discovery
  labels:
    {{- include "agwcp.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "agwcp.fullname" . }}-discovery
subjects:
- kind: ServiceAccount
  name: {{ include "agwcp.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
