# Default namespace for documentation; use: helm install -n api-gateway
namespace: api-gateway

createNamespace: false

nameOverride: ""
fullnameOverride: ""

global:
  imagePullSecrets: []

defaultPodAntiAffinity: true
defaultTopologySpreadConstraints: true

# OpenTelemetry (optional). Merged into each component app `config` as a top-level `telemetry:` key.
# Per-component merge overwrites these keys: see `components.<name>.telemetry`.
# Maps to the same structure as the `telemetry` section in repo config YAML
# (enabled, service_name, otlp_endpoint, otlp_insecure, otlp_protocol).
# Base is off: enable explicitly when a collector (e.g. Jaeger OTLP) is available.
telemetry:
  enabled: false
  # service_name: ""          # optional; app defaults to the binary (api-server, controller, …)
  # otlp_endpoint: ""         # e.g. http://jaeger.observability.svc.cluster.local:4317
  # otlp_insecure: true
  # otlp_protocol: "grpc"     # grpc | http

etcd:
  endpoints: []
  tls:
    existingSecret: ""

certManager:
  createCertificates: false
  # If true: CA Certificate (bootstrapIssuerRef) → namespaced Issuer (CA) → all gRPC leaf certs.
  # Produces Secret ...-grpc-internal-ca-tls trusted by all components (same pattern as dev/grpc-certificates.yaml).
  # If false: all Certificates use issuerRef directly; you must create ...-grpc-internal-ca-tls yourself (e.g. from leaf ca.crt).
  useNamespaceCAChain: false
  # Optional; when useNamespaceCAChain, CA cert is issued by this ref (defaults to issuerRef).
  bootstrapIssuerRef: {}
  issuerRef:
    kind: ClusterIssuer
    name: ""
  additionalDnsNames: []
  duration: 8760h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256

# When certManager.createCertificates is false, set explicit secret names (empty = derived from fullname)
tls:
  internalCASecret: ""
  controller:
    grpcServerSecret: ""
    clientToApiServerSecret: ""
  apiServer:
    grpcServerSecret: ""
    clientToContractSyncerSecret: ""
  contractSyncer:
    grpcServerSecret: ""

components:
  controller:
    enabled: true
    replicaCount: 1
    image:
      repository: merionyx/api-gateway-controller
      tag: ""
      pullPolicy: IfNotPresent
    resources: {}
    podAnnotations: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
    topologySpreadConstraints: []
    pdb:
      enabled: true
      minAvailable: 1
    kubernetesDiscovery:
      enabled: true
      resourceLabelSelector:
        gateway.merionyx.com/team: demo
    tenant: cluster-default
    config: {}
    telemetry: {}

  apiServer:
    enabled: true
    replicaCount: 1
    image:
      repository: merionyx/api-gateway-api-server
      tag: ""
      pullPolicy: IfNotPresent
    resources: {}
    podAnnotations: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
    topologySpreadConstraints: []
    pdb:
      enabled: true
      minAvailable: 1
    jwt:
      # Two Kubernetes Secret names (release namespace): API vs Edge signing keys (*.key PEM). Must differ.
      # If empty, chart defaults to <releaseFullname>-jwt-api-keys and <releaseFullname>-jwt-edge-keys.
      apiKeysSecret: ""
      edgeKeysSecret: ""
      # Which key signs new JWTs when several *.key files exist in a mount: set under merged API config (not here):
      #   components.apiServer.config.jwt.api_signing_kid
      #   components.apiServer.config.jwt.edge_signing_kid
      # kid = file basename without .key; all keys still appear in JWKS for verifying old tokens.
    # Session KEK for encrypting IdP refresh tokens at rest (auth.session_kek_base64).
    # Set existingSecret to a Secret name in the release namespace; never commit raw key material in values.
    # Injects API_SERVER_AUTH_SESSION_KEK_BASE64 from secretKeyRef (see docs/operator-api-server-auth.md).
    sessionKek:
      existingSecret: ""
      secretKey: "kek"
    # Optional: map auth.oidc_providers[].id → Secret keys for client_id / client_secret (injected as AGWCP_OIDC_* env).
    # Keys must match provider id in components.apiServer.config.auth.oidc_providers. See chart README.
    oidcProviderCredentials: {}
    # Merged over chart defaults (e.g. readiness.require_contract_syncer for GET /ready).
    config: {}
    # Merged over global .telemetry; use to override tracing for this component only.
    telemetry: {}

  contractSyncer:
    enabled: true
    replicaCount: 1
    image:
      repository: merionyx/api-gateway-contract-syncer
      tag: ""
      pullPolicy: IfNotPresent
    resources: {}
    podAnnotations: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
    topologySpreadConstraints: []
    pdb:
      enabled: true
      minAvailable: 1
    # Optional: one Secret with many keys (e.g. GITHUB_ACCESS_TOKEN) for all repos.
    envFromSecret: ""
    # Optional: per-repo tokens as env vars from separate Secrets (avoids one huge envFrom Secret).
    # Each envName must match repositories[].auth.token_env in contractSyncer.config.
    # repositoryTokens:
    #   - envName: GIT_TOKEN_SCHEMAS
    #     secretName: git-token-schemas
    #     secretKey: token
    repositoryTokens: []
    config: {}
    telemetry: {}
