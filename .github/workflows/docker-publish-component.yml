name: Publish one Docker image (multi-arch)

permissions:
  contents: read
  packages: write

on:
  workflow_call:
    inputs:
      component:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      checkout_ref:
        description: Git ref to build (commit SHA or tag)
        required: false
        type: string
        default: ""
      version:
        description: Docker image tag (latest, v1.0.0, ...)
        required: false
        type: string
        default: latest

env:
  IMAGE_PREFIX: merionyx/api-gateway
  # Mirror to GHCR (hyphen style, same as primary Docker Hub name)
  GHCR_IMAGE_PREFIX: ghcr.io/merionyx/api-gateway

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - platform: linux/amd64
          runner: ubuntu-latest
          arch_short: amd64
        - platform: linux/arm64
          runner: ubuntu-24.04-arm
          arch_short: arm64

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.checkout_ref != '' && inputs.checkout_ref || github.sha }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push (by digest)
      id: build
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ${{ inputs.dockerfile }}
        platforms: ${{ matrix.platform }}
        provenance: false
        sbom: false
        outputs: type=image,name=${{ env.IMAGE_PREFIX }}-${{ inputs.component }},push-by-digest=true,push=true
        cache-from: type=gha,scope=build-${{ inputs.component }}-${{ matrix.arch_short }}
        cache-to: type=gha,scope=build-${{ inputs.component }}-${{ matrix.arch_short }},mode=max

    - name: Write digest file
      run: echo "${{ steps.build.outputs.digest }}" > "${{ inputs.component }}-${{ matrix.arch_short }}.txt"

    - name: Upload digest
      uses: actions/upload-artifact@v7
      with:
        name: digest-${{ inputs.component }}-${{ matrix.arch_short }}
        path: ${{ inputs.component }}-${{ matrix.arch_short }}.txt
        if-no-files-found: error

  merge-manifests:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Download digests
      uses: actions/download-artifact@v8
      with:
        pattern: digest-${{ inputs.component }}-*
        path: digests
        merge-multiple: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Multi-arch manifest (Docker Hub)
      run: |
        AMD=$(tr -d '\n' < "digests/${COMPONENT}-amd64.txt")
        ARM=$(tr -d '\n' < "digests/${COMPONENT}-arm64.txt")
        docker buildx imagetools create \
          -t "${IMAGE_PREFIX}-${COMPONENT}:${VERSION}" \
          "${IMAGE_PREFIX}-${COMPONENT}@${AMD}" \
          "${IMAGE_PREFIX}-${COMPONENT}@${ARM}"
      env:
        IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        COMPONENT: ${{ inputs.component }}
        VERSION: ${{ inputs.version }}

    - name: Install crane
      env:
        CRANE_VERSION: v0.20.3
      run: |
        curl -fsSL "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz" -o /tmp/crane.tgz
        tar -xzf /tmp/crane.tgz -C /tmp
        sudo mv /tmp/crane /usr/local/bin/

    # Test. Duplicate on Docker Hub (nested path merionyx/api-gateway/<component>)
    - name: Duplicate on Docker Hub (nested path merionyx/api-gateway/<component>)
      run: |
        crane copy \
          "docker.io/${IMAGE_PREFIX}-${COMPONENT}:${VERSION}" \
          "docker.io/${IMAGE_PREFIX}/${COMPONENT}:${VERSION}"
      env:
        IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        COMPONENT: ${{ inputs.component }}
        VERSION: ${{ inputs.version }}

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Mirror multi-arch image to GHCR
      run: |
        crane copy \
          "docker.io/${IMAGE_PREFIX}-${COMPONENT}:${VERSION}" \
          "${GHCR_IMAGE_PREFIX}-${COMPONENT}:${VERSION}"
      env:
        IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        GHCR_IMAGE_PREFIX: ${{ env.GHCR_IMAGE_PREFIX }}
        COMPONENT: ${{ inputs.component }}
        VERSION: ${{ inputs.version }}
