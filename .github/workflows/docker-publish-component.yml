name: Publish one Docker image (multi-arch)

on:
  workflow_call:
    inputs:
      component:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      checkout_ref:
        description: Git ref to build (commit SHA when triggered via workflow_run)
        required: false
        type: string
        default: ""

env:
  IMAGE_PREFIX: merionyx/api-gateway

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - platform: linux/amd64
          runner: ubuntu-latest
          arch_short: amd64
        - platform: linux/arm64
          runner: ubuntu-24.04-arm
          arch_short: arm64

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.checkout_ref != '' && inputs.checkout_ref || github.sha }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push (by digest)
      id: build
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ${{ inputs.dockerfile }}
        platforms: ${{ matrix.platform }}
        provenance: false
        sbom: false
        outputs: type=image,name=${{ env.IMAGE_PREFIX }}-${{ inputs.component }},push-by-digest=true,push=true
        cache-from: type=gha,scope=build-${{ inputs.component }}-${{ matrix.arch_short }}
        cache-to: type=gha,scope=build-${{ inputs.component }}-${{ matrix.arch_short }},mode=max

    - name: Write digest file
      run: echo "${{ steps.build.outputs.digest }}" > "${{ inputs.component }}-${{ matrix.arch_short }}.txt"

    - name: Upload digest
      uses: actions/upload-artifact@v7
      with:
        name: digest-${{ inputs.component }}-${{ matrix.arch_short }}
        path: ${{ inputs.component }}-${{ matrix.arch_short }}.txt
        if-no-files-found: error

  merge-manifests:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Download digests
      uses: actions/download-artifact@v8
      with:
        pattern: digest-${{ inputs.component }}-*
        path: digests
        merge-multiple: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Multi-arch manifest (latest)
      run: |
        AMD=$(tr -d '\n' < "digests/${COMPONENT}-amd64.txt")
        ARM=$(tr -d '\n' < "digests/${COMPONENT}-arm64.txt")
        docker buildx imagetools create \
          -t "${IMAGE_PREFIX}-${COMPONENT}:latest" \
          "${IMAGE_PREFIX}-${COMPONENT}@${AMD}" \
          "${IMAGE_PREFIX}-${COMPONENT}@${ARM}"
      env:
        IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        COMPONENT: ${{ inputs.component }}
