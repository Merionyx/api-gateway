name: Publish one Docker image (multi-arch)

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

on:
  workflow_call:
    inputs:
      component:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      checkout_ref:
        description: Git ref to build (commit SHA or tag)
        required: false
        type: string
        default: ""
      version:
        description: Docker image tag (latest, v1.0.0, ...)
        required: false
        type: string
        default: latest

env:
  IMAGE_PREFIX: merionyx/api-gateway
  # Mirror to GHCR (same path after ghcr.io as docker.io)
  GHCR_IMAGE_PREFIX: ghcr.io/merionyx/api-gateway

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - platform: linux/amd64
          runner: ubuntu-latest
          arch_short: amd64
          runtime: distroless
          target: runtime-distroless
        - platform: linux/arm64
          runner: ubuntu-24.04-arm
          arch_short: arm64
          runtime: distroless
          target: runtime-distroless
        - platform: linux/amd64
          runner: ubuntu-latest
          arch_short: amd64
          runtime: alpine
          target: runtime-alpine
        - platform: linux/arm64
          runner: ubuntu-24.04-arm
          arch_short: arm64
          runtime: alpine
          target: runtime-alpine

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.checkout_ref != '' && inputs.checkout_ref || github.sha }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: OCI display name for image labels
      id: oci
      run: |
        case "${{ inputs.component }}" in
          api-server) echo 'name=API Server' >> "$GITHUB_OUTPUT" ;;
          controller) echo 'name=Controller' >> "$GITHUB_OUTPUT" ;;
          auth-sidecar) echo 'name=Auth Sidecar' >> "$GITHUB_OUTPUT" ;;
          contract-syncer) echo 'name=Contract Syncer' >> "$GITHUB_OUTPUT" ;;
          mock-service) echo 'name=Mock Service' >> "$GITHUB_OUTPUT" ;;
          *) echo "Unknown component: ${{ inputs.component }}"; exit 1 ;;
        esac

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push (by digest)
      id: build
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ${{ inputs.dockerfile }}
        target: ${{ matrix.target }}
        build-args: |
          SERVICE=${{ inputs.component }}
          OCI_NAME=${{ steps.oci.outputs.name }}
        platforms: ${{ matrix.platform }}
        provenance: mode=max
        sbom: true
        outputs: type=image,name=${{ env.IMAGE_PREFIX }}-${{ inputs.component }},push-by-digest=true,push=true
        cache-from: type=gha,scope=build-${{ inputs.component }}-${{ matrix.arch_short }}-${{ matrix.runtime }}
        cache-to: type=gha,scope=build-${{ inputs.component }}-${{ matrix.arch_short }}-${{ matrix.runtime }},mode=max

    - name: Write digest file
      run: echo "${{ steps.build.outputs.digest }}" > "${{ inputs.component }}-${{ matrix.arch_short }}-${{ matrix.runtime }}.txt"

    - name: Upload digest
      uses: actions/upload-artifact@v7
      with:
        name: digest-${{ inputs.component }}-${{ matrix.arch_short }}-${{ matrix.runtime }}
        path: ${{ inputs.component }}-${{ matrix.arch_short }}-${{ matrix.runtime }}.txt
        if-no-files-found: error

  merge-manifests:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Download digests
      uses: actions/download-artifact@v8
      with:
        pattern: digest-${{ inputs.component }}-*
        path: digests
        merge-multiple: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to Docker Hub (docker.io)
      uses: docker/login-action@v4
      with:
        registry: docker.io
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Login to Docker Hub (registry-1.docker.io)
      uses: docker/login-action@v4
      with:
        registry: registry-1.docker.io
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Multi-arch manifest — distroless (default tag)
      run: |
        set -euo pipefail
        amd_file=$(find digests -name "${COMPONENT}-amd64-distroless.txt" | head -n1)
        arm_file=$(find digests -name "${COMPONENT}-arm64-distroless.txt" | head -n1)
        AMD=$(tr -d '\n' < "${amd_file}")
        ARM=$(tr -d '\n' < "${arm_file}")
        docker buildx imagetools create \
          -t "${IMAGE_PREFIX}-${COMPONENT}:${VERSION}" \
          "${IMAGE_PREFIX}-${COMPONENT}@${AMD}" \
          "${IMAGE_PREFIX}-${COMPONENT}@${ARM}"
      env:
        IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        COMPONENT: ${{ inputs.component }}
        VERSION: ${{ inputs.version }}

    - name: Multi-arch manifest — Alpine (${VERSION}-alpine)
      run: |
        set -euo pipefail
        amd_file=$(find digests -name "${COMPONENT}-amd64-alpine.txt" | head -n1)
        arm_file=$(find digests -name "${COMPONENT}-arm64-alpine.txt" | head -n1)
        AMD=$(tr -d '\n' < "${amd_file}")
        ARM=$(tr -d '\n' < "${arm_file}")
        docker buildx imagetools create \
          -t "${IMAGE_PREFIX}-${COMPONENT}:${ALPINE_TAG}" \
          "${IMAGE_PREFIX}-${COMPONENT}@${AMD}" \
          "${IMAGE_PREFIX}-${COMPONENT}@${ARM}"
      env:
        IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        COMPONENT: ${{ inputs.component }}
        VERSION: ${{ inputs.version }}
        ALPINE_TAG: ${{ inputs.version }}-alpine

    - name: Install crane
      env:
        CRANE_VERSION: v0.20.3
      run: |
        curl -fsSL "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz" -o /tmp/crane.tgz
        tar -xzf /tmp/crane.tgz -C /tmp
        sudo mv /tmp/crane /usr/local/bin/

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Mirror multi-arch images to GHCR
      run: |
        crane copy \
          "docker.io/${IMAGE_PREFIX}-${COMPONENT}:${VERSION}" \
          "${GHCR_IMAGE_PREFIX}-${COMPONENT}:${VERSION}"
        crane copy \
          "docker.io/${IMAGE_PREFIX}-${COMPONENT}:${ALPINE_TAG}" \
          "${GHCR_IMAGE_PREFIX}-${COMPONENT}:${ALPINE_TAG}"
      env:
        IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        GHCR_IMAGE_PREFIX: ${{ env.GHCR_IMAGE_PREFIX }}
        COMPONENT: ${{ inputs.component }}
        VERSION: ${{ inputs.version }}
        ALPINE_TAG: ${{ inputs.version }}-alpine

    - name: Resolve merged image digest (distroless)
      id: merged-distroless
      run: |
        DIGEST="$(crane digest "docker.io/${IMAGE_PREFIX}-${COMPONENT}:${VERSION}")"
        echo "digest=${DIGEST}" >> "${GITHUB_OUTPUT}"
      env:
        IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        COMPONENT: ${{ inputs.component }}
        VERSION: ${{ inputs.version }}

    - name: Resolve merged image digest (Alpine)
      id: merged-alpine
      run: |
        DIGEST="$(crane digest "docker.io/${IMAGE_PREFIX}-${COMPONENT}:${ALPINE_TAG}")"
        echo "digest=${DIGEST}" >> "${GITHUB_OUTPUT}"
      env:
        IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        COMPONENT: ${{ inputs.component }}
        ALPINE_TAG: ${{ inputs.version }}-alpine

    - name: Attest build provenance (Docker Hub — distroless)
      uses: actions/attest-build-provenance@v2
      with:
        subject-name: index.docker.io/merionyx/api-gateway-${{ inputs.component }}
        subject-digest: ${{ steps.merged-distroless.outputs.digest }}
        push-to-registry: true

    - name: Attest build provenance (GHCR — distroless)
      uses: actions/attest-build-provenance@v2
      with:
        subject-name: ghcr.io/merionyx/api-gateway-${{ inputs.component }}
        subject-digest: ${{ steps.merged-distroless.outputs.digest }}
        push-to-registry: true

    - name: Attest build provenance (Docker Hub — Alpine)
      uses: actions/attest-build-provenance@v2
      with:
        subject-name: index.docker.io/merionyx/api-gateway-${{ inputs.component }}
        subject-digest: ${{ steps.merged-alpine.outputs.digest }}
        push-to-registry: true

    - name: Attest build provenance (GHCR — Alpine)
      uses: actions/attest-build-provenance@v2
      with:
        subject-name: ghcr.io/merionyx/api-gateway-${{ inputs.component }}
        subject-digest: ${{ steps.merged-alpine.outputs.digest }}
        push-to-registry: true
