name: CI — Pull request to main

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:


permissions:
  contents: read

jobs:
  lint:
    uses: ./.github/workflows/reusable-go-lint.yml
    secrets: inherit

  unit:
    uses: ./.github/workflows/reusable-go-unit.yml
    secrets: inherit

  integration:
    uses: ./.github/workflows/reusable-go-integration.yml
    secrets: inherit

  gosec:
    uses: ./.github/workflows/reusable-go-gosec.yml
    secrets: inherit

  govulncheck:
    uses: ./.github/workflows/reusable-go-govulncheck.yml
    secrets: inherit
