name: CI — Pull request to main

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-pr-main-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    uses: ./.github/workflows/reusable-go-lint.yml
    secrets: inherit

  unit:
    uses: ./.github/workflows/reusable-go-unit.yml
    secrets: inherit

  integration:
    uses: ./.github/workflows/reusable-go-integration.yml
    secrets: inherit
