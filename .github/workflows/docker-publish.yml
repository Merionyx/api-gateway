# Публикация образов только после успешного «Lint & Tests» на main (lint-and-tests.yml), либо вручную (workflow_dispatch).
name: Publish Docker images to Docker Hub

on:
  workflow_run:
    workflows: [ Lint & Tests ]
    types:
    - completed
  workflow_dispatch:


jobs:
  gate:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    outputs:
      checkout_ref: ${{ steps.ref.outputs.sha }}
    steps:
    - id: ref
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
        else
          echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
        fi

  api-server:
    needs: gate
    uses: ./.github/workflows/docker-publish-component.yml
    with:
      component: api-server
      dockerfile: build/release/Dockerfile.api-server
      checkout_ref: ${{ needs.gate.outputs.checkout_ref }}
    secrets: inherit

  auth-sidecar:
    needs: gate
    uses: ./.github/workflows/docker-publish-component.yml
    with:
      component: auth-sidecar
      dockerfile: build/release/Dockerfile.auth-sidecar
      checkout_ref: ${{ needs.gate.outputs.checkout_ref }}
    secrets: inherit

  contract-syncer:
    needs: gate
    uses: ./.github/workflows/docker-publish-component.yml
    with:
      component: contract-syncer
      dockerfile: build/release/Dockerfile.contract-syncer
      checkout_ref: ${{ needs.gate.outputs.checkout_ref }}
    secrets: inherit

  controller:
    needs: gate
    uses: ./.github/workflows/docker-publish-component.yml
    with:
      component: controller
      dockerfile: build/release/Dockerfile.controller
      checkout_ref: ${{ needs.gate.outputs.checkout_ref }}
    secrets: inherit

  mock-service:
    needs: gate
    uses: ./.github/workflows/docker-publish-component.yml
    with:
      component: mock-service
      dockerfile: build/dev/Dockerfile.mock-service
      checkout_ref: ${{ needs.gate.outputs.checkout_ref }}
    secrets: inherit
