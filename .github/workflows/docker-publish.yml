name: Publish Docker images to Docker Hub

on:
  push:
    branches:
    - main

env:
  IMAGE_PREFIX: merionyx/api-gateway
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
        - component: api-server
          dockerfile: build/release/Dockerfile.api-server
        - component: auth-sidecar
          dockerfile: build/release/Dockerfile.auth-sidecar
        - component: contract-syncer
          dockerfile: build/release/Dockerfile.contract-syncer
        - component: controller
          dockerfile: build/release/Dockerfile.controller
        - component: mock-service
          dockerfile: build/dev/Dockerfile.mock-service

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ${{ matrix.dockerfile }}
        platforms: ${{ env.PLATFORMS }}
        push: true
        tags: |
          ${{ env.IMAGE_PREFIX }}-${{ matrix.component }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
