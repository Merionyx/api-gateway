name: Publish Docker images to Docker Hub

on:
  push:
    branches:
    - main

env:
  IMAGE_PREFIX: merionyx/api-gateway

jobs:
  # amd64 на x86-раннере и arm64 на нативном ARM — без QEMU, быстрее чем эмуляция.
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - component: api-server
          dockerfile: build/release/Dockerfile.api-server
          platform: linux/amd64
          runner: ubuntu-latest
          arch_short: amd64
        - component: api-server
          dockerfile: build/release/Dockerfile.api-server
          platform: linux/arm64
          runner: ubuntu-24.04-arm
          arch_short: arm64
        - component: auth-sidecar
          dockerfile: build/release/Dockerfile.auth-sidecar
          platform: linux/amd64
          runner: ubuntu-latest
          arch_short: amd64
        - component: auth-sidecar
          dockerfile: build/release/Dockerfile.auth-sidecar
          platform: linux/arm64
          runner: ubuntu-24.04-arm
          arch_short: arm64
        - component: contract-syncer
          dockerfile: build/release/Dockerfile.contract-syncer
          platform: linux/amd64
          runner: ubuntu-latest
          arch_short: amd64
        - component: contract-syncer
          dockerfile: build/release/Dockerfile.contract-syncer
          platform: linux/arm64
          runner: ubuntu-24.04-arm
          arch_short: arm64
        - component: controller
          dockerfile: build/release/Dockerfile.controller
          platform: linux/amd64
          runner: ubuntu-latest
          arch_short: amd64
        - component: controller
          dockerfile: build/release/Dockerfile.controller
          platform: linux/arm64
          runner: ubuntu-24.04-arm
          arch_short: arm64
        - component: mock-service
          dockerfile: build/dev/Dockerfile.mock-service
          platform: linux/amd64
          runner: ubuntu-latest
          arch_short: amd64
        - component: mock-service
          dockerfile: build/dev/Dockerfile.mock-service
          platform: linux/arm64
          runner: ubuntu-24.04-arm
          arch_short: arm64

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push (by digest)
      id: build
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ${{ matrix.dockerfile }}
        platforms: ${{ matrix.platform }}
        provenance: false
        sbom: false
        outputs: type=image,name=${{ env.IMAGE_PREFIX }}-${{ matrix.component }},push-by-digest=true,push=true
        cache-from: type=gha,scope=build-${{ matrix.component }}-${{ matrix.arch_short }}
        cache-to: type=gha,scope=build-${{ matrix.component }}-${{ matrix.arch_short }},mode=max

    - name: Write digest file
      run: echo "${{ steps.build.outputs.digest }}" > "${{ matrix.component }}-${{ matrix.arch_short }}.txt"

    - name: Upload digest
      uses: actions/upload-artifact@v4
      with:
        name: digest-${{ matrix.component }}-${{ matrix.arch_short }}
        path: ${{ matrix.component }}-${{ matrix.arch_short }}.txt
        if-no-files-found: error

  merge-manifests:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
        - api-server
        - auth-sidecar
        - contract-syncer
        - controller
        - mock-service

    steps:
    - name: Download digests
      uses: actions/download-artifact@v4
      with:
        pattern: digest-*
        path: digests
        merge-multiple: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Multi-arch manifest (latest)
      run: |
        docker buildx imagetools create \
          -t "${IMAGE_PREFIX}-${COMPONENT}:latest"
      env:
        IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        COMPONENT: ${{ matrix.component }}
