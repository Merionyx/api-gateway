name: CI — Push to main

permissions:
  contents: read
  packages: write
  id-token: write

on:
  push:
    branches: [ main ]

jobs:
  lint:
    uses: ./.github/workflows/reusable-go-lint.yml
    secrets: inherit

  unit:
    uses: ./.github/workflows/reusable-go-unit.yml
    secrets: inherit

  integration:
    uses: ./.github/workflows/reusable-go-integration.yml
    secrets: inherit

  publish:
    needs: [ lint, unit, integration ]
    uses: ./.github/workflows/docker-publish.yml
    with:
      version: latest
      checkout_ref: ${{ github.sha }}
    secrets: inherit

  # Chart version: unique prerelease per workflow run; appVersion stays "latest" for snapshot installs.
  helm-publish:
    needs: [ lint, unit, integration ]
    uses: ./.github/workflows/helm-publish.yml
    with:
      version: 0.0.0
      app_version: latest
      checkout_ref: ${{ github.sha }}
    secrets: inherit
