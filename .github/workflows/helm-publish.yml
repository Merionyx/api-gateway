name: Publish Helm charts to GHCR (OCI)

permissions:
  contents: read
  packages: write

on:
  workflow_call:
    inputs:
      version:
        description: Chart semver (leading v is stripped if present)
        required: true
        type: string
      app_version:
        description: Chart appVersion (e.g. latest for main snapshots)
        required: false
        type: string
        default: ""
      checkout_ref:
        description: Git ref to package
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: Chart version (semver, may include v prefix)
        required: true
        type: string
      app_version:
        description: Chart appVersion (empty = same as chart version)
        required: false
        type: string
        default: ""
      checkout_ref:
        description: Git ref (branch, tag, SHA)
        required: false
        type: string
        default: ""

jobs:
  push-charts:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.checkout_ref != '' && inputs.checkout_ref || github.sha }}

    - name: Normalize chart semver (strip leading v)
      id: chart
      run: |
        RAW="${{ inputs.version }}"
        CHART_VER="${RAW#v}"
        echo "chart_version=${CHART_VER}" >> "${GITHUB_OUTPUT}"

    - name: Set appVersion
      id: ver
      run: |
        APP="${{ inputs.app_version }}"
        if [ -z "$APP" ]; then
          APP="${{ steps.chart.outputs.chart_version }}"
        fi
        echo "app_version=${APP}" >> "${GITHUB_OUTPUT}"

    - name: Install Helm
      uses: azure/setup-helm@v4
      with:
        version: v3.16.3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Package and push api-gateway-control-plane
      run: |
        mkdir -p /tmp/helm-out
        helm package deployments/helm/api-gateway-control-plane \
          --version "${CHART_VERSION}" \
          --app-version "${APP_VERSION}" \
          -d /tmp/helm-out
        PKG=$(ls /tmp/helm-out/api-gateway-control-plane-*.tgz)
        helm push "${PKG}" oci://ghcr.io/merionyx/charts
      env:
        CHART_VERSION: ${{ steps.chart.outputs.chart_version }}
        APP_VERSION: ${{ steps.ver.outputs.app_version }}

    - name: Package and push api-gateway-edge
      run: |
        helm package deployments/helm/api-gateway-edge \
          --version "${CHART_VERSION}" \
          --app-version "${APP_VERSION}" \
          -d /tmp/helm-out
        PKG=$(ls /tmp/helm-out/api-gateway-edge-*.tgz)
        helm push "${PKG}" oci://ghcr.io/merionyx/charts
      env:
        CHART_VERSION: ${{ steps.chart.outputs.chart_version }}
        APP_VERSION: ${{ steps.ver.outputs.app_version }}
