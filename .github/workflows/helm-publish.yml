name: Publish Helm charts to GHCR and Docker Hub (OCI)

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

on:
  workflow_call:
    inputs:
      version:
        description: Chart semver (leading v is stripped if present)
        required: true
        type: string
      app_version:
        description: Chart appVersion (e.g. latest for main snapshots)
        required: false
        type: string
        default: ""
      checkout_ref:
        description: Git ref to package
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: Chart version (semver, may include v prefix)
        required: true
        type: string
      app_version:
        description: Chart appVersion (empty = same as chart version)
        required: false
        type: string
        default: ""
      checkout_ref:
        description: Git ref (branch, tag, SHA)
        required: false
        type: string
        default: ""

env:
  CRANE_VERSION: v0.20.3

jobs:
  push-charts:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.checkout_ref != '' && inputs.checkout_ref || github.sha }}

    - name: Normalize chart semver (strip leading v)
      id: chart
      run: |
        RAW="${{ inputs.version }}"
        CHART_VER="${RAW#v}"
        echo "chart_version=${CHART_VER}" >> "${GITHUB_OUTPUT}"

    - name: Set appVersion
      id: ver
      run: |
        APP="${{ inputs.app_version }}"
        if [ -z "$APP" ]; then
          APP="${{ steps.chart.outputs.chart_version }}"
        fi
        echo "app_version=${APP}" >> "${GITHUB_OUTPUT}"

    - name: Install Helm
      uses: azure/setup-helm@v4
      with:
        version: v3.16.3

    - name: Install crane
      run: |
        curl -fsSL "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz" -o /tmp/crane.tgz
        tar -xzf /tmp/crane.tgz -C /tmp
        sudo mv /tmp/crane /usr/local/bin/

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Login to Docker Hub (docker.io)
      uses: docker/login-action@v4
      with:
        registry: docker.io
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Login to Docker Hub (registry-1.docker.io)
      uses: docker/login-action@v4
      with:
        registry: registry-1.docker.io
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Login to Docker Hub (helm OCI)
      env:
        DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      run: |
        set -euo pipefail
        echo "$DOCKERHUB_TOKEN" | helm registry login registry-1.docker.io \
          -u "$DOCKERHUB_USERNAME" \
          --password-stdin

    # Без Cosign/Syft: публикация OCI + SLSA provenance через GitHub (как для Docker-образов).
    - name: Package and push (api-gateway-control-plane)
      env:
        CHART_VERSION: ${{ steps.chart.outputs.chart_version }}
        APP_VERSION: ${{ steps.ver.outputs.app_version }}
        CHART_NAME: api-gateway-control-plane
        CHART_DIR: deployments/helm/api-gateway-control-plane
      run: |
        set -euo pipefail
        mkdir -p /tmp/helm-out
        helm package "${CHART_DIR}" \
          --version "${CHART_VERSION}" \
          --app-version "${APP_VERSION}" \
          -d /tmp/helm-out
        PKG=$(ls "/tmp/helm-out/${CHART_NAME}"-*.tgz)
        helm push "${PKG}" "oci://ghcr.io/merionyx/api-gateway/charts"
        helm push "${PKG}" "oci://registry-1.docker.io/merionyx"

    - name: Resolve digest (api-gateway-control-plane)
      id: digest_cp
      env:
        CHART_VERSION: ${{ steps.chart.outputs.chart_version }}
      run: |
        DIGEST="$(crane digest "ghcr.io/merionyx/api-gateway/charts/api-gateway-control-plane:${CHART_VERSION}")"
        echo "digest=${DIGEST}" >> "${GITHUB_OUTPUT}"

    - name: Attest build provenance (api-gateway-control-plane → GHCR)
      uses: actions/attest-build-provenance@v2
      with:
        subject-name: ghcr.io/merionyx/api-gateway/charts/api-gateway-control-plane
        subject-digest: ${{ steps.digest_cp.outputs.digest }}
        push-to-registry: true

    - name: Attest build provenance (api-gateway-control-plane → Docker Hub)
      uses: actions/attest-build-provenance@v2
      with:
        subject-name: index.docker.io/merionyx/api-gateway-control-plane
        subject-digest: ${{ steps.digest_cp.outputs.digest }}
        push-to-registry: true

    - name: Package and push (api-gateway-edge)
      env:
        CHART_VERSION: ${{ steps.chart.outputs.chart_version }}
        APP_VERSION: ${{ steps.ver.outputs.app_version }}
        CHART_NAME: api-gateway-edge
        CHART_DIR: deployments/helm/api-gateway-edge
      run: |
        set -euo pipefail
        mkdir -p /tmp/helm-out
        helm package "${CHART_DIR}" \
          --version "${CHART_VERSION}" \
          --app-version "${APP_VERSION}" \
          -d /tmp/helm-out
        PKG=$(ls "/tmp/helm-out/${CHART_NAME}"-*.tgz)
        helm push "${PKG}" "oci://ghcr.io/merionyx/api-gateway/charts"
        helm push "${PKG}" "oci://registry-1.docker.io/merionyx"

    - name: Resolve digest (api-gateway-edge)
      id: digest_edge
      env:
        CHART_VERSION: ${{ steps.chart.outputs.chart_version }}
      run: |
        DIGEST="$(crane digest "ghcr.io/merionyx/api-gateway/charts/api-gateway-edge:${CHART_VERSION}")"
        echo "digest=${DIGEST}" >> "${GITHUB_OUTPUT}"

    - name: Attest build provenance (api-gateway-edge → GHCR)
      uses: actions/attest-build-provenance@v2
      with:
        subject-name: ghcr.io/merionyx/api-gateway/charts/api-gateway-edge
        subject-digest: ${{ steps.digest_edge.outputs.digest }}
        push-to-registry: true

    - name: Attest build provenance (api-gateway-edge → Docker Hub)
      uses: actions/attest-build-provenance@v2
      with:
        subject-name: index.docker.io/merionyx/api-gateway-edge
        subject-digest: ${{ steps.digest_edge.outputs.digest }}
        push-to-registry: true
