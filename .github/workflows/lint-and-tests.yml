name: Lint & Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Go vet
      run: go vet ./...

    - name: Unit tests and coverage gate
      env:
        COVERAGE_MIN_PERCENT: "25"
      run: bash scripts/ci/check-coverage.sh

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.11.4
        args: --timeout=5m

  integration:
    runs-on: ubuntu-latest
    services:
      etcd:
        image: quay.io/coreos/etcd:v3.6.0
        ports:
        - 2379:2379
        env:
          ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
          ETCD_ADVERTISE_CLIENT_URLS: http://127.0.0.1:2379
    env:
      INTEGRATION_ETCD_ENDPOINT: http://127.0.0.1:2379
    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Integration tests
      run: go test -tags=integration ./test/integration/... -count=1 -timeout=5m -v
