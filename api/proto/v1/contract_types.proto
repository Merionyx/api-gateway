syntax = "proto3";

package api.contract.v1;

option go_package = "merionyx/api-gateway/pkg/api/contract/v1;contractv1";

// Shared contract routing snapshot (used across registry, syncer, schemas, environments APIs).

message ContractUpstream {
  string name = 1;
}

message App {
  string app_id = 1;
  repeated string environments = 2;
}

message Access {
  bool secure = 1;
  repeated App apps = 2;
}

message ContractSnapshot {
  string name = 1;
  string prefix = 2;
  ContractUpstream upstream = 3;
  bool allow_undefined_methods = 4;
  Access access = 5;
}
