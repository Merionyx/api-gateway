syntax = "proto3";

package api.snapshots.v1;

option go_package = "merionyx/api-gateway/control-plane/pkg/api/snapshots/v1;snapshotsv1";

// UpdateSnapshotRequest request for updating xDS snapshot
message UpdateSnapshotRequest {
  string environment = 1; // If empty, update all environments
}

// UpdateSnapshotResponse response for updating xDS snapshot
message UpdateSnapshotResponse {
  bool success = 1;
  repeated string updated_environments = 2;
}

// GetSnapshotStatusRequest request for getting xDS snapshot status
message GetSnapshotStatusRequest {
  string environment = 1;
}

// GetSnapshotStatusResponse response for getting xDS snapshot status
message GetSnapshotStatusResponse {
  string environment = 1;
  string version = 2;
  int32 contracts_count = 4;
  int32 clusters_count = 5;
  int32 routes_count = 6;
}

// SnapshotsService is the service for managing xDS snapshots
service SnapshotsService {
  rpc UpdateSnapshot(UpdateSnapshotRequest) returns (UpdateSnapshotResponse);
  rpc GetSnapshotStatus(GetSnapshotStatusRequest) returns (GetSnapshotStatusResponse);
}