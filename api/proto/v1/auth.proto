syntax = "proto3";

package api.auth.v1;

option go_package = "merionyx/api-gateway/pkg/api/auth/v1;authv1";

// ContractAccess access to a contract
message ContractAccess {
  string contract_name = 1;
  bool secure = 2;
  string prefix = 3;
  repeated AppAccess apps = 4;
}

// AppAccess access to an application
message AppAccess {
  string app_id = 1;
  repeated string environments = 2;
}

// AccessConfig full access configuration for an environment
message AccessConfig {
  string environment = 1;
  repeated ContractAccess contracts = 2;
  int64 version = 3; // Configuration version
}

// SyncAccessRequest request to synchronize
message SyncAccessRequest {
  string environment = 1;
  string sidecar_id = 2; // Unique sidecar ID
}

// SyncAccessResponse response with configuration
message SyncAccessResponse {
  oneof message {
    AccessConfig initial_config = 1;  // Initial configuration
    AccessUpdate update = 2;          // Incremental update
    Heartbeat heartbeat = 3;          // Heartbeat for keep-alive
  }
}

// AccessUpdate incremental update
message AccessUpdate {
  string environment = 1;
  repeated ContractAccess added_contracts = 2;
  repeated ContractAccess updated_contracts = 3;
  repeated string removed_contracts = 4; // Contract names
  int64 version = 5;
}

// Heartbeat for keeping the connection alive
message Heartbeat {
  int64 timestamp = 1;
}

// AuthService service for synchronizing access rights
service AuthService {
  // Bidirectional streaming for synchronization
  rpc SyncAccess(stream SyncAccessRequest) returns (stream SyncAccessResponse);
  
  // Get current configuration (unary)
  rpc GetAccessConfig(GetAccessConfigRequest) returns (AccessConfig);
}

// GetAccessConfigRequest request for configuration
message GetAccessConfigRequest {
  string environment = 1;
}