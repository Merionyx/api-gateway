syntax = "proto3";

package api.environment.v1;

option go_package = "merionyx/api-gateway/control-plane/pkg/api/environment/v1;environmentv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

// Environment message for environment
message Environment {
  string id = 1;
  string name = 2;
  google.protobuf.Struct config = 3;
  string tenant_id = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

// CreateEnvironmentRequest request for creating environment
message CreateEnvironmentRequest {
  string name = 1;
  google.protobuf.Struct config = 2;
  string tenant_id = 3;
}

// CreateEnvironmentResponse response for creating environment
message CreateEnvironmentResponse {
  Environment environment = 1;
}

// GetEnvironmentRequest request for getting environment
message GetEnvironmentRequest {
  string id = 1;
}

// GetEnvironmentResponse response for getting environment
message GetEnvironmentResponse {
  Environment environment = 1;
}

// GetEnvironmentByNameRequest request for getting environment by name
message GetEnvironmentByNameRequest {
  string name = 1;
}

// GetEnvironmentByNameResponse response for getting environment by name
message GetEnvironmentByNameResponse {
  Environment environment = 1;
}

// GetEnvironmentsRequest request for getting list of environments
message GetEnvironmentsRequest {}

// GetEnvironmentsResponse response for getting list of environments
message GetEnvironmentsResponse {
  repeated Environment environments = 1;
}

// GetEnvironmentsByTenantRequest request for getting environments by tenant
message GetEnvironmentsByTenantRequest {
  string tenant_id = 1;
}

// GetEnvironmentsByTenantResponse response for getting environments by tenant
message GetEnvironmentsByTenantResponse {
  repeated Environment environments = 1;
}

// UpdateEnvironmentRequest request for updating environment
message UpdateEnvironmentRequest {
  string id = 1;
  string name = 2;
  google.protobuf.Struct config = 3;
}

// UpdateEnvironmentResponse response for updating environment
message UpdateEnvironmentResponse {
  Environment environment = 1;
}

// DeleteEnvironmentRequest request for deleting environment
message DeleteEnvironmentRequest {
  string id = 1;
}

// DeleteEnvironmentResponse response for deleting environment
message DeleteEnvironmentResponse {}

// MapEnvironmentToTenantRequest request for mapping environment to tenant
message MapEnvironmentToTenantRequest {
  string environment_id = 1;
  string tenant_id = 2;
}

// MapEnvironmentToTenantResponse response for mapping environment to tenant
message MapEnvironmentToTenantResponse {}

// UnmapEnvironmentFromTenantRequest request for unmapping environment from tenant
message UnmapEnvironmentFromTenantRequest {
  string environment_id = 1;
  string tenant_id = 2;
}

// UnmapEnvironmentFromTenantResponse response for unmapping environment from tenant
message UnmapEnvironmentFromTenantResponse {}

// EnvironmentService service for working with environments
service EnvironmentService {
  // CreateEnvironment creates new environment
  rpc CreateEnvironment(CreateEnvironmentRequest) returns (CreateEnvironmentResponse);
  
  // GetEnvironment gets environment by ID
  rpc GetEnvironment(GetEnvironmentRequest) returns (GetEnvironmentResponse);
  
  // GetEnvironmentByName gets environment by name
  rpc GetEnvironmentByName(GetEnvironmentByNameRequest) returns (GetEnvironmentByNameResponse);
  
  // GetEnvironments gets list of all environments
  rpc GetEnvironments(GetEnvironmentsRequest) returns (GetEnvironmentsResponse);
  
  // GetEnvironmentsByTenant gets environments by tenant
  rpc GetEnvironmentsByTenant(GetEnvironmentsByTenantRequest) returns (GetEnvironmentsByTenantResponse);
  
  // UpdateEnvironment updates environment
  rpc UpdateEnvironment(UpdateEnvironmentRequest) returns (UpdateEnvironmentResponse);
  
  // DeleteEnvironment deletes environment
  rpc DeleteEnvironment(DeleteEnvironmentRequest) returns (DeleteEnvironmentResponse);
  
  // MapEnvironmentToTenant maps environment to tenant
  rpc MapEnvironmentToTenant(MapEnvironmentToTenantRequest) returns (MapEnvironmentToTenantResponse);
  
  // UnmapEnvironmentFromTenant unmaps environment from tenant
  rpc UnmapEnvironmentFromTenant(UnmapEnvironmentFromTenantRequest) returns (UnmapEnvironmentFromTenantResponse);
}
