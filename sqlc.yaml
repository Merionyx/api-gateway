version: "2"
sql:
- engine: "postgresql"
  schema: "./databases/postgres/schema.sql"
  queries: "./databases/postgres/queries"
  gen:
    go:
      package: "queries"
      out: "internal/queries"
      sql_package: "pgx/v5"
      emit_json_tags: true
      overrides:
      - db_type: "uuid"
        go_type:
          import: "github.com/google/uuid"
          type: "UUID"
      - db_type: "pg_catalog.timestamp"
        go_type:
          import: "time"
          type: "Time"
      - db_type: "pg_catalog.timestamptz"
        go_type:
          import: "time"
          type: "Time"
