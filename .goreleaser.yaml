version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: api-server
    binary: api-server
    main: ./cmd/api-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

  - id: contract-syncer
    binary: contract-syncer
    main: ./cmd/contract-syncer
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

  - id: controller
    binary: controller
    main: ./cmd/controller
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

  - id: auth-sidecar
    binary: auth-sidecar
    main: ./cmd/auth-sidecar
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

  - id: agwctl
    binary: agwctl
    main: ./cmd/cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: api-server
    builds:
      - api-server
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "api-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}"
    files:
      - none*

  - id: contract-syncer
    builds:
      - contract-syncer
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "contract-syncer_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}"
    files:
      - none*

  - id: controller
    builds:
      - controller
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "controller_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}"
    files:
      - none*

  - id: auth-sidecar
    builds:
      - auth-sidecar
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "auth-sidecar_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}"
    files:
      - none*

  - id: agwctl
    builds:
      - agwctl
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "agwctl_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}"
    files:
      - none*

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  use: github-native

release:
  prerelease: auto
  footer: |
    ### Container images (tag `{{ .Tag }}`)

    **Docker Hub**
    ```
    docker pull merionyx/api-gateway-api-server:{{ .Tag }}
    docker pull merionyx/api-gateway-auth-sidecar:{{ .Tag }}
    docker pull merionyx/api-gateway-contract-syncer:{{ .Tag }}
    docker pull merionyx/api-gateway-controller:{{ .Tag }}
    ```

    **GitHub Container Registry** (mirror)
    ```
    docker pull ghcr.io/merionyx/api-gateway-api-server:{{ .Tag }}
    docker pull ghcr.io/merionyx/api-gateway-auth-sidecar:{{ .Tag }}
    docker pull ghcr.io/merionyx/api-gateway-contract-syncer:{{ .Tag }}
    docker pull ghcr.io/merionyx/api-gateway-controller:{{ .Tag }}
    ```

    ### Helm (OCI)

    Chart version is the git tag **without** the leading `v` (for `{{ .Tag }}` that is `{{ trimPrefix "v" .Tag }}`).

    ```
    helm pull oci://ghcr.io/merionyx/charts/api-gateway-control-plane --version {{ trimPrefix "v" .Tag }}
    helm pull oci://ghcr.io/merionyx/charts/api-gateway-edge --version {{ trimPrefix "v" .Tag }}
    ```
