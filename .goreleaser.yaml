version: 2

before:
  hooks:
  - go mod tidy

builds:
- id: api-server
  binary: api-server
  main: ./cmd/api-server
  env:
  - CGO_ENABLED=0
  goos:
  - linux
  goarch:
  - amd64
  - arm64

- id: contract-syncer
  binary: contract-syncer
  main: ./cmd/contract-syncer
  env:
  - CGO_ENABLED=0
  goos:
  - linux
  goarch:
  - amd64
  - arm64

- id: controller
  binary: controller
  main: ./cmd/controller
  env:
  - CGO_ENABLED=0
  goos:
  - linux
  goarch:
  - amd64
  - arm64

- id: auth-sidecar
  binary: auth-sidecar
  main: ./cmd/auth-sidecar
  env:
  - CGO_ENABLED=0
  goos:
  - linux
  goarch:
  - amd64
  - arm64

- id: agwctl
  binary: agwctl
  main: ./cmd/cli
  env:
  - CGO_ENABLED=0
  goos:
  - linux
  - darwin
  - windows
  goarch:
  - amd64
  - arm64
  ignore:
  - goos: windows
    goarch: arm64

archives:
- id: api-server
  ids:
  - api-server
  formats:
  - tar.gz
  format_overrides:
  - goos: windows
    formats:
    - zip
  name_template: "api-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}"

- id: contract-syncer
  ids:
  - contract-syncer
  formats:
  - tar.gz
  format_overrides:
  - goos: windows
    formats:
    - zip
  name_template: "contract-syncer_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}"

- id: controller
  ids:
  - controller
  formats:
  - tar.gz
  format_overrides:
  - goos: windows
    formats:
    - zip
  name_template: "controller_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}"

- id: auth-sidecar
  ids:
  - auth-sidecar
  formats:
  - tar.gz
  format_overrides:
  - goos: windows
    formats:
    - zip
  name_template: "auth-sidecar_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}"

- id: agwctl
  ids:
  - agwctl
  formats:
  - tar.gz
  format_overrides:
  - goos: windows
    formats:
    - zip
  name_template: "agwctl_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  use: github-native

release:
  prerelease: auto
  footer: |
    ### Container images (git tag `{{ .Tag }}`)

    **Docker Hub**
    ```
    docker pull merionyx/api-gateway-api-server:{{ .Tag }}
    docker pull merionyx/api-gateway-auth-sidecar:{{ .Tag }}
    docker pull merionyx/api-gateway-contract-syncer:{{ .Tag }}
    docker pull merionyx/api-gateway-controller:{{ .Tag }}
    ```

    **GitHub Container Registry** (mirror)
    ```
    docker pull ghcr.io/merionyx/api-gateway-api-server:{{ .Tag }}
    docker pull ghcr.io/merionyx/api-gateway-auth-sidecar:{{ .Tag }}
    docker pull ghcr.io/merionyx/api-gateway-contract-syncer:{{ .Tag }}
    docker pull ghcr.io/merionyx/api-gateway-controller:{{ .Tag }}
    ```

    ### Helm (OCI)

    **GitHub Container Registry**
    ```
    helm pull oci://ghcr.io/merionyx/api-gateway/charts/api-gateway-control-plane --version {{ .Version }}
    helm pull oci://ghcr.io/merionyx/api-gateway/charts/api-gateway-edge --version {{ .Version }}
    ```

    **Docker Hub**
    ```
    helm pull oci://registry-1.docker.io/merionyx/api-gateway-control-plane --version {{ .Version }}
    helm pull oci://registry-1.docker.io/merionyx/api-gateway-edge --version {{ .Version }}
    ```
