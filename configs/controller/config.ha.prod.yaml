server:
  http1_port: "8080"
  http2_port: "8443"
  grpc_port: "19090"
  xds_port: "19091"
  host: "localhost"

etcd:
  endpoints:
  - "https://etcd-controller-prod-1:2379"
  - "https://etcd-controller-prod-2:2379"
  - "https://etcd-controller-prod-3:2379"
  dial_timeout: "5s"
  tls:
    enabled: true
    cert_file: "./secrets/certs/etcd/client.pem"
    key_file: "./secrets/certs/etcd/client-key.pem"
    ca_file: "./secrets/certs/etcd/ca.pem"

tenant: "prod-cluster"

ha:
  controller_id: "gateway-controller-prod-pool"

leader_election:
  enabled: true
  key_prefix: "/api-gateway/controller/election/leader-prod"
  identity: ""
  session_ttl_seconds: 5

api_server:
  address: "gateway-ha-lb:19093"

environments:
- name: prod
  bundles:
    static:
    - name: api-gateway-schemas
      repository: api-gateway-schemas-https
      ref: tags/v0.0.1
      path: openapi
  services:
    static:
    - name: be-service-01
      upstream: "http://mock-be-service-01-prod:8080"
    - name: be-service-02
      upstream: "http://mock-be-service-02-prod:8080"

services:
  static:
  - name: be-service-03
    upstream: "http://mock-be-service-03:8080"
