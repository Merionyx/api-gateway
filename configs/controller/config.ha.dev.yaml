server:
  http1_port: "8080"
  http2_port: "8443"
  grpc_port: "19090"
  xds_port: "19091"
  host: "localhost"

etcd:
  endpoints:
  - "https://etcd-controller-dev-1:2379"
  - "https://etcd-controller-dev-2:2379"
  - "https://etcd-controller-dev-3:2379"
  dial_timeout: "5s"
  tls:
    enabled: true
    cert_file: "./secrets/certs/etcd/client.pem"
    key_file: "./secrets/certs/etcd/client-key.pem"
    ca_file: "./secrets/certs/etcd/ca.pem"

tenant: "dev-cluster"

# Same logical id on every replica so API Server keeps one snapshot stream per pool (default: hostname).
ha:
  controller_id: "gateway-controller-dev-pool"

leader_election:
  enabled: true
  key_prefix: "/api-gateway/controller/election/leader-dev"
  identity: ""
  session_ttl_seconds: 5

# Through HAProxy (compose HA): balancing + sticky gRPC.
api_server:
  address: "gateway-ha-lb:19093"

environments:

services:
  static:
  - name: be-service-03
    upstream: "http://mock-be-service-03:8080"
