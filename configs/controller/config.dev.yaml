server:
  http1_port: "8080"
  http2_port: "8443"
  grpc_port: "19090"
  xds_port: "19091"
  host: "localhost"

etcd:
  endpoints:
  - "https://etcd-controller-dev-1:2379"
  - "https://etcd-controller-dev-2:2379"
  - "https://etcd-controller-dev-3:2379"
  dial_timeout: "5s"
  tls:
    enabled: true
    cert_file: "./secrets/certs/etcd/client.pem"
    key_file: "./secrets/certs/etcd/client-key.pem"
    ca_file: "./secrets/certs/etcd/ca.pem"

tenant: "dev-cluster"

# Один id на пул; при leader_election.enabled: true пустой ha.controller_id запрещён (см. LoadConfig).
# Для single-replica dev без id можно выставить leader_election.enabled: false.
ha:
  controller_id: "gateway-controller-dev"

leader_election:
  enabled: true
  key_prefix: "/api-gateway/controller/election/leader-dev"
  identity: ""
  session_ttl_seconds: 5

# gRPC address of API Server (ControllerRegistry / snapshot stream)
api_server:
  address: "gateway-api-server:19093"

# OpenTelemetry (optional)
# telemetry:
#   enabled: false
#   service_name: "controller"
#   otlp_endpoint: "http://jaeger:4317"
#   otlp_insecure: true

environments:

services:
  static:
  - name: be-service-03
    upstream: "http://mock-be-service-03:8080"
