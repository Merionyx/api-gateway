server:
  http1_port: "8080"
  http2_port: "8443"
  grpc_port: "8090"
  host: "localhost"

repositories:
- name: api-gateway-schemas-https
  source: git
  url: "https://github.com/MikhailMinaev/api-gateway-schemas.git"
  auth:
    type: "token"
    token_env: "GITHUB_ACCESS_TOKEN"
    # - name: api-gateway-schemas-ssh
    #   url: "git@github.com:MikhailMinaev/api-gateway-schemas.git"
    #   auth:
    #     type: "ssh"
    #     ssh_key_path: "./secrets/keys/api-schemas-ed25519"
    # ssh_key_env: "SSH_PRIVATE_KEY"

environments:
- name: dev
  contracts:
    type: static
    list:
    - name: api-gateway-schemas
      repository: api-gateway-schemas-https
      ref: master
  services:
    type: static
    list:
    - name: be-service-01
      upstream: "http://localhost:8080"
    - name: be-service-02
      upstream: "http://localhost:8081"
- name: prod
  contracts:
    type: static
    list:
    - name: api-gateway-schemas
      repository: api-gateway-schemas-https
      ref: master
  services:
    type: static
    list:
    - name: be-service-01
      upstream: "http://localhost:8090"
    - name: be-service-02
      upstream: "http://localhost:8091"
