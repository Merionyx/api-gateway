server:
  http_port: "8080"
  grpc_port: "19093"
  host: "0.0.0.0"
  # Browser CORS (roadmap ш. 24): list every Origin (scheme+host+port) allowed to call this API from the browser.
  # Production/staging must not use "*". Leave empty to disable CORS until UIs are known.
  cors:
    allow_origins: []

etcd:
  endpoints:
  - "https://etcd-api-server-1:2379"
  - "https://etcd-api-server-2:2379"
  - "https://etcd-api-server-3:2379"
  dial_timeout: "5s"
  tls:
    enabled: true
    cert_file: "./secrets/certs/etcd/client.pem"
    key_file: "./secrets/certs/etcd/client-key.pem"
    ca_file: "./secrets/certs/etcd/ca.pem"

jwt:
  keys_dir: "./secrets/api-server/keys/jwt"
  # edge_keys_dir: ""  # omit = <keys_dir>/edge
  issuer: "api-gateway-api-server"
  # api_audience, edge_issuer, edge_audience: see config defaults (API_SERVER_JWT_*)

contract_syncer:
  address: "gateway-contract-syncer:19092"

# GET /ready: etcd is always checked; Contract Syncer is optional unless enabled below
readiness:
  require_contract_syncer: false

# Single leader runs bundle sync (Contract Syncer gRPC); all replicas watch etcd and push updates
# to controllers that hold StreamSnapshots on that replica (HAProxy sticky to one API Server per source).
leader_election:
  enabled: true
  key_prefix: "/api-gateway/api-server/election/leader"
  identity: ""
  session_ttl_seconds: 5

# Idempotency-Key on POST /api/v1/bundles/sync: memory (default) or etcd (HA).
idempotency:
  backend: "memory"
  bundle_sync_ttl: "24h"
  etcd_key_prefix: "/api-gateway/api-server/idempotency/v1"
  cluster: ""

# Auth etcd layout (API keys, future sessions). Bootstrap is dev-only — see docs/operator-api-server-auth.md
auth:
  etcd_key_prefix: "/api-gateway/api-server/auth/v1"
  environment: "production"
  allow_insecure_bootstrap: false
  # login_intent_lease_ttl: "15m"   # default if omitted
  # session_kek_base64: "<openssl rand -base64 32>"  # required when oidc_providers is set (32 bytes after decode)
  # oidc_providers:                 # browser GET /api/v1/auth/login; see docs/etcd-auth-paths.md
  #   - id: "dev-oidc"
  #     issuer: "https://your-idp.example"
  #     client_id: "your-client-id"
  #     client_secret: "from-secret-manager"
  #     redirect_uri_allowlist:
  #       - "http://127.0.0.1:8080/api/v1/auth/callback"
  #     extra_scopes: ["email"]
  # GitHub (roadmap ш.35): docs/idp/github/README.md — issuer must be https://github.com/login/oauth ; kind: github
  #   - id: "github"
  #     kind: "github"
  #     issuer: "https://github.com/login/oauth"
  #     client_id: "…"
  #     client_secret: "…"
  #     redirect_uri_allowlist: ["http://127.0.0.1:21987/callback"]
  #     github:
  #       allowed_org_logins: ["my-org"]
  #       team_role_bindings:
  #         - { org: "my-org", team_slug: "admins", roles: ["api:admin"] }
  # GitLab (roadmap ш.36): docs/idp/gitlab/README.md — issuer = https://gitlab.com or self-managed origin; kind: gitlab
  #   - id: "gitlab"
  #     kind: "gitlab"
  #     issuer: "https://gitlab.com"
  #     client_id: "…"
  #     client_secret: "…"
  #     redirect_uri_allowlist: ["http://127.0.0.1:21987/callback"]
  #     gitlab:
  #       allowed_group_paths: ["my-root-group"]
  #       group_role_bindings:
  #         - { group_full_path: "my-root-group/admins", roles: ["api:admin"] }
  # Google (roadmap ш.37): docs/idp/google/README.md — issuer must be https://accounts.google.com ; kind: google
  #   - id: "google"
  #     kind: "google"
  #     issuer: "https://accounts.google.com"
  #     client_id: "….apps.googleusercontent.com"
  #     client_secret: "…"
  #     redirect_uri_allowlist: ["http://127.0.0.1:21987/callback"]
  #     google:
  #       allowed_hosted_domains: ["example.com"]
  #       hosted_domain_role_bindings:
  #         - { hd: "example.com", roles: ["api:admin"] }
  # Okta (roadmap ш.38): docs/idp/okta/README.md — issuer = Authorization Server URL (https); kind: okta
  #   - id: "okta"
  #     kind: "okta"
  #     issuer: "https://dev-12345.okta.com/oauth2/default"
  #     client_id: "…"
  #     client_secret: "…"
  #     redirect_uri_allowlist: ["http://127.0.0.1:21987/callback"]
  #     okta:
  #       allowed_id_token_groups: ["API Gateway Users"]
  #       group_role_bindings:
  #         - { group_name: "API Gateway Admins", roles: ["api:admin"] }
  # Entra ID (roadmap ш.39): docs/idp/entra/README.md — issuer = v2.0 metadata URL (https); kind: entra
  #   - id: "entra"
  #     kind: "entra"
  #     issuer: "https://login.microsoftonline.com/aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa/v2.0"
  #     client_id: "…"
  #     client_secret: "…"
  #     redirect_uri_allowlist: ["http://127.0.0.1:21987/callback"]
  #     entra:
  #       allowed_tenant_ids: ["aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa"]
  #       allowed_id_token_groups: ["<group object id as in id_token>"]
  #       group_role_bindings:
  #         - { group: "<same string as in id_token groups>", roles: ["api:admin"] }

  # OpenTelemetry: optional; can be overridden (e.g. TELEMETRY_ENABLED) via environment.
  # telemetry:
  #   enabled: false
  #   service_name: "api-server"
  #   otlp_endpoint: "http://jaeger:4317"
  #   otlp_insecure: true
  #   otlp_protocol: "grpc"
