syntax = "proto3";

package merionyx.gateway.contract_syncer.v1;

import "merionyx/gateway/common/v1/contract_types.proto";

option go_package = "github.com/merionyx/api-gateway/pkg/grpc/contract_syncer/v1;contractsyncerv1";

// SyncRequest request to sync snapshots for a specific bundle
message SyncRequest {
  string repository = 1;
  string ref = 2;
  string path = 3;
}

// SyncResponse response with snapshots for a bundle
message SyncResponse {
  repeated merionyx.gateway.common.v1.ContractSnapshot snapshots = 1;
  string error = 2;
}

// ExportContractsRequest pulls raw contract schema files from git (no etcd).
message ExportContractsRequest {
  string repository = 1;
  string ref = 2;
  string path = 3;
  string contract_name = 4;
}

message ExportContractFile {
  string contract_name = 1;
  string source_path = 2;
  bytes content = 3;
}

message ExportContractsResponse {
  repeated ExportContractFile files = 1;
  string error = 2;
}

// ContractSyncerService service for synchronizing contracts
service ContractSyncerService {
  rpc Sync(SyncRequest) returns (SyncResponse);
  rpc ExportContracts(ExportContractsRequest) returns (ExportContractsResponse);
}
