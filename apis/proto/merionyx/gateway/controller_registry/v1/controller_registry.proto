syntax = "proto3";

package merionyx.gateway.controller_registry.v1;

import "merionyx/gateway/common/v1/contract_types.proto";

option go_package = "github.com/merionyx/api-gateway/pkg/grpc/controller_registry/v1;controllerregistryv1";

// RegisterControllerRequest registers a Gateway Controller with the API Server.
// environments is the full snapshot of environments this controller declares (static + K8s + etcd CRUD merge);
// it is not a delta.
message RegisterControllerRequest {
  string controller_id = 1;
  string tenant = 2;
  repeated EnvironmentInfo environments = 3;
}

// ConfigSource names which input won for a bundle key in the effective merge (ADR 0001, phase 3).
enum ConfigSource {
  CONFIG_SOURCE_UNSPECIFIED = 0;
  CONFIG_SOURCE_FILE = 1;
  CONFIG_SOURCE_KUBERNETES = 2;
  CONFIG_SOURCE_ETCD_GRPC = 3;
}

// Provenance of one static bundle in the effective list (per-bundle winner).
message BundleProvenance {
  ConfigSource source = 1;
}

// EnvironmentInfo information about environment
message EnvironmentInfo {
  string name = 1;
  repeated BundleInfo bundles = 2;
  // Materialized effective generation when available (from controller etcd /effective/.../v1). Omitted if unknown.
  optional int64 effective_generation = 3;
  // Fingerprint of static name/type/bundles/services (hex SHA-256) matching materialized `sources_fingerprint` when in sync.
  optional string sources_fingerprint = 4;
}

// BundleInfo information about bundle
message BundleInfo {
  string name = 1;
  string repository = 2;
  string ref = 3;
  string path = 4;
  // Which source’s entry won for this bundle key in the effective merge.
  BundleProvenance provenance = 5;
}

// RegisterControllerResponse response to registration.
// Failures are reported via gRPC status (google.rpc.Status); success=true only when RPC completes with OK.
message RegisterControllerResponse {
  bool success = 1;
  string error = 2;
}

// StreamSnapshotsRequest request to stream snapshots
message StreamSnapshotsRequest {
  string controller_id = 1;
}

// StreamSnapshotsResponse stream snapshots for controller
message StreamSnapshotsResponse {
  string environment = 1;
  string bundle_key = 2;
  repeated merionyx.gateway.common.v1.ContractSnapshot snapshots = 3;
}

// HeartbeatRequest periodic update from controller.
// environments must be the full current snapshot (same semantics as RegisterControllerRequest.environments).
// The API Server replaces the stored controller record's environment list with this payload (not a merge/delta).
message HeartbeatRequest {
  string controller_id = 1;
  repeated EnvironmentInfo environments = 2;
}

// HeartbeatResponse response to heartbeat.
// Failures are reported via gRPC status; success=true only when RPC completes with OK.
message HeartbeatResponse {
  bool success = 1;
}

// ControllerRegistryService service for registration and managing controllers
service ControllerRegistryService {
  rpc RegisterController(RegisterControllerRequest) returns (RegisterControllerResponse);
  rpc StreamSnapshots(StreamSnapshotsRequest) returns (stream StreamSnapshotsResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}
