  /api/v1/auth/login:
    get:
      tags: [ OIDC ]
      operationId: loginOidc
      security: []
      summary: Start OIDC login (redirect)
      description: |
        Draft: starts the browser OIDC authorization code + PKCE flow for a configured `provider_id`. The server responds with **302** to the IdP `authorization_endpoint` (Location), or returns **400** when parameters are invalid. `redirect_uri` must match operator allowlists (**roadmap / threat model**).
      parameters:
      - name: provider_id
        in: query
        required: true
        description: Registered IdP configuration identifier.
        schema:
          type: string
      - name: redirect_uri
        in: query
        required: true
        description: Callback URL registered for this client (allowlisted server-side).
        schema:
          type: string
          format: uri
      responses:
        '302':
          description: Redirect to the IdP authorization endpoint.
          headers:
            Location:
              description: IdP authorization URL including `state` and PKCE challenge.
              schema:
                type: string
                format: uri
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/auth/callback:
    get:
      tags: [ OIDC ]
      operationId: callbackOidc
      security: []
      summary: OIDC callback (authorization code exchange)
      description: |
        Draft: browser redirect target after IdP login. Exchanges `code` for tokens, runs first CEL mapping, establishes a server session, returns **200 JSON** with our `access_token` / `refresh_token` (**API profile only** in MVP).
      parameters:
      - name: code
        in: query
        required: true
        schema:
          type: string
      - name: state
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Session established; API-profile tokens returned as JSON (not Set-Cookie).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/auth/refresh:
    post:
      tags: [ OIDC ]
      operationId: refreshSession
      security: []
      summary: Refresh API session tokens
      description: |
        Draft: exchanges a valid our `refresh_token` for a new `access_token` / `refresh_token` pair. Implements **IdP up** (full CEL) and **IdP down / degraded** branches (see repo doc `docs/degraded-refresh-api-server.md`). Concurrent refresh conflicts return **409** (`application/problem+json`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRefreshRequest'
      responses:
        '200':
          description: New token pair (normal or degraded refresh).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

