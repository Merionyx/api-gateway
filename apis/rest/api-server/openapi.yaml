openapi: 3.0.3
info:
  title: API Gateway — API Server HTTP API
  version: 1.4.0
  description: |
    HTTP API for the **API Server** control plane: authentication material (JWT, JWKS), contract export,
    registry views backed by **etcd** (controllers, tenants, bundles), and operational endpoints.

    **Data model:** registry responses are **read-only snapshots** of stored state. Environment configuration
    lifecycle is owned by the **Gateway Controller**; this API does not expose CRUD for environments.

    **JSON naming:** request and response bodies use **snake_case** field names unless noted.

    **v1.4.0 (roadmap step 4 — OpenAPI draft):** per-operation `security` (public vs `bearerAuth` **or** `apiKey`);
    split **Edge** vs **API** JWKS and token issuance paths; OIDC **login** / **callback** / **refresh** (draft contracts —
    handlers land in roadmap steps 13–14, 17–18). Existing HTTP handlers may still ignore `Authorization` until the
    deny-by-default middleware (**roadmap step 20**); the spec documents the target contract.

    **v1.1.0** added optional `config_source` on static bundles, `sources_fingerprint` and `effective_generation` on
    environments. **v1.2.0** added `environment_config_source`, `services` (static upstreams with per-line
    `config_source`). **v1.3.0** nests that observability in **`meta`** on each entity (`provenance.config_source`, plus
    `effective_generation` / `sources_fingerprint` only on environment `meta`); flat `config_source` fields on bundles
    and services are removed in favor of `meta.provenance`.

    **Errors:** all failed requests use **`application/problem+json`** (RFC 9457 / RFC 7807 Problem Details).
  contact:
    name: Merionyx API Gateway
  license:
    name: Proprietary
    url: https://merionyx.com/

servers:
- url: '{baseUrl}'
  description: Configurable base URL (set `baseUrl` when using this spec in clients).
  variables:
    baseUrl:
      default: http://127.0.0.1:8080
      description: API Server origin without trailing slash.

tags:
- name: System
  description: Liveness (`/health`), readiness (`/ready`), build metadata (`/api/v1/version`), and aggregate status (`/api/v1/status`)
- name: Authentication
  description: JWT issuance, JWKS, signing keys
- name: OIDC
  description: Interactive OAuth2/OIDC login, callback, and refresh (draft)
- name: Contracts
  description: Contract export from Git via Contract Syncer
- name: Registry
  description: Controllers and tenants (etcd-backed views)
- name: Bundles
  description: Bundle keys and contract snapshots stored in etcd
- name: Operations
  description: Sync and maintenance actions

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        **API profile** access JWT (`iss` / `aud` / `kid` for API Server HTTP routes). Not interchangeable with Edge tokens.
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        Opaque M2M / CI API key (never logged or returned after creation). Constant-time lookup server-side.

  parameters:
    Limit:
      name: limit
      in: query
      description: Maximum number of items to return (cursor pagination).
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 50
    Cursor:
      name: cursor
      in: query
      description: Opaque cursor from a previous response (`next_cursor`). Omit for the first page.
      required: false
      schema:
        type: string
    IfNoneMatch:
      name: If-None-Match
      in: header
      description: |
        Weak or strong ETag from a prior `GET` response. When it matches the current representation,
        the server returns `304 Not Modified` with no response body.
      required: false
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      description: |
        Optional unique key for safely retrying the same logical request. If the server has already
        completed a successful operation with this key, it may return the same response without repeating work.
      required: false
      schema:
        type: string
        minLength: 16
        maxLength: 128
    ControllerId:
      name: controller_id
      in: path
      required: true
      description: Controller identifier as stored in etcd.
      schema:
        type: string
    Tenant:
      name: tenant
      in: path
      required: true
      description: Tenant name.
      schema:
        type: string
    BundleKeyQuery:
      name: bundle_key
      in: query
      required: false
      description: |
        Optional internal snapshot key (`repository/escapedRef/escapedPath`), same as in etcd paths.
        Prefer `repo` + `ref` (+ `path`) for clients. Mutually exclusive with those when both sets would
        identify a bundle. Standard query decoding can turn `%2F` into `/`; the server normalizes the
        usual over-decoded form when possible. Alternatively encode `%` as `%25` so literal `%2F` survives one decode.
      schema:
        type: string
    BundleRepoQuery:
      name: repo
      in: query
      required: false
      description: Repository identifier (first segment of the bundle key). Use together with `ref`; optional `path`.
      schema:
        type: string
    BundleRefQuery:
      name: ref
      in: query
      required: false
      description: Git ref (slashes allowed). Combined with `repo` and optional `path` via the same rules as `bundlekey.Build`.
      schema:
        type: string
    BundlePathQuery:
      name: path
      in: query
      required: false
      description: |
        Logical bundle root path inside the repository. Omit or leave empty for the default root
        (same as `.` in the etcd key segment).
      schema:
        type: string
    ContractName:
      name: contract_name
      in: path
      required: true
      description: Logical contract name within the bundle.
      schema:
        type: string

  headers:
    ETag:
      description: |
        Entity tag for the response body (typically a weak ETag, e.g. `W/"..."`), used with `If-None-Match`.
      schema:
        type: string

  schemas:
    Problem:
      type: object
      description: |
        RFC 7807 / RFC 9457 Problem Details.

        **Localization:** use `code` (stable `UPPER_SNAKE_CASE`) as the i18n message key, e.g. `problem.NOT_FOUND`
        or `errors.api.NOT_FOUND`. `title` and `detail` are default English text for debugging and optional
        display; do not rely on them as the only source for UI copy in translated apps.

        **Security:** low-level causes (stack traces, etcd/syncer diagnostics) must be logged server-side only;
        the API returns `code` plus a neutral `detail` suitable for operators or an optional “technical details” panel.
      properties:
        type:
          type: string
          format: uri
          description: |
            URI identifying this class of problem (stable per `code`). Clients may use `code` alone for i18n.
        code:
          type: string
          description: Stable machine-readable problem code for localization and client branching.
          example: NOT_FOUND
        title:
          type: string
          description: Short human-readable summary (default locale; optional for UI when i18n is used).
        status:
          type: integer
          description: HTTP status code.
        detail:
          type: string
          description: Human-readable explanation for this occurrence (default locale).
        instance:
          type: string
          format: uri
          description: URI reference identifying this specific occurrence.
      required:
      - title
      - status

    HealthStatus:
      type: object
      required:
      - status
      properties:
        status:
          type: string
          example: ok

    VersionResponse:
      type: object
      description: Process build metadata and the OpenAPI `info.version` of the HTTP surface served by this binary.
      required:
      - api_schema_version
      - git_revision
      - build_time
      properties:
        api_schema_version:
          type: string
          description: Matches OpenAPI `info.version` embedded with this server (HTTP API schema revision).
          example: "1.0.0"
        git_revision:
          type: string
          description: Git commit baked in at link time; `unknown` when not set (local `go run`).
        build_time:
          type: string
          description: RFC3339 UTC build timestamp when set at link time; `unknown` otherwise.
          example: "2026-04-11T12:00:00Z"
        release:
          type: string
          description: Optional release or image tag (e.g. semver) from CI.
          example: "1.2.3"

    ReadinessStatus:
      type: object
      description: |
        Kubernetes-style readiness: **200** when `status` is `ok`, **503** when `not_ready`.
        Contract Syncer may be `skipped` when the server is configured not to require it for readiness.
      required:
      - status
      - etcd
      - contract_syncer
      properties:
        status:
          type: string
          description: ok if all required dependency checks passed
        etcd:
          type: string
          description: ok after a lightweight read against the API Server etcd prefix
        contract_syncer:
          type: string
          description: ok, error, or skipped

    Jwks:
      type: object
      required:
      - keys
      properties:
        keys:
          type: array
          items:
            $ref: '#/components/schemas/Jwk'

    Jwk:
      type: object
      properties:
        kid:
          type: string
        kty:
          type: string
        alg:
          type: string
        use:
          type: string
        n:
          type: string
        e:
          type: string
        crv:
          type: string
        x:
          type: string

    SigningKey:
      type: object
      required:
      - kid
      - algorithm
      - active
      - created_at
      properties:
        kid:
          type: string
        algorithm:
          type: string
          description: e.g. EdDSA, RS256
        active:
          type: boolean
        created_at:
          type: string
          format: date-time

    GenerateTokenRequest:
      type: object
      required:
      - app_id
      - environments
      - expires_at
      properties:
        app_id:
          type: string
        environments:
          type: array
          items:
            type: string
          minItems: 1
        expires_at:
          type: string
          format: date-time

    GenerateTokenResponse:
      type: object
      required:
      - id
      - token
      - app_id
      - environments
      - expires_at
      - created_at
      properties:
        id:
          type: string
        token:
          type: string
          description: Full JWT string (returned only on creation).
        app_id:
          type: string
        environments:
          type: array
          items:
            type: string
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    AuthRefreshRequest:
      type: object
      required:
      - refresh_token
      properties:
        refresh_token:
          type: string
          description: Our refresh token from the last login or refresh response (server must not log this value).

    AuthSessionTokensResponse:
      type: object
      required:
      - access_token
      - refresh_token
      properties:
        access_token:
          type: string
          description: New **API profile** access JWT.
        refresh_token:
          type: string
          description: Rotated our refresh token; clients must discard the previous pair.
        token_type:
          type: string
          description: Token type for `access_token` (e.g. Bearer).
          default: Bearer

    IssueApiAccessTokenRequest:
      type: object
      description: |
        Draft body for `POST /api/v1/tokens/api`. Final fields follow RBAC/CEL and M2M policy (**roadmap steps 22–23**).
      properties:
        requested_scopes:
          type: array
          items:
            type: string
          description: Optional hints; the server may ignore or narrow scopes.

    IssueApiAccessTokenResponse:
      type: object
      required:
      - access_token
      - expires_at
      properties:
        access_token:
          type: string
          description: Short-lived **API profile** JWT for calling this HTTP API.
        expires_at:
          type: string
          format: date-time
        refresh_token:
          type: string
          description: Issued for interactive-style sessions when applicable (draft).

    ContractsExportRequest:
      type: object
      required:
      - repository
      - ref
      properties:
        repository:
          type: string
        ref:
          type: string
        path:
          type: string
          description: Path inside the repository; omit for entire repo.
        contract_name:
          type: string
          description: Single contract name; omit for all under path.

    ContractsExportResponse:
      type: object
      required:
      - files
      properties:
        files:
          type: array
          items:
            $ref: '#/components/schemas/ContractsExportFile'

    ContractsExportFile:
      type: object
      required:
      - contract_name
      - source_path
      - content_base64
      properties:
        contract_name:
          type: string
        source_path:
          type: string
        content_base64:
          type: string
          description: Base64-encoded file bytes.

    ConfigSource:
      type: string
      description: |
        Which input layer’s static entry won for this name/key in the effective merge
        (controller → API Server; ADR 0001).
      enum:
      - file
      - kubernetes
      - etcd_grpc
      - unspecified

    Provenance:
      type: object
      description: Provenance of the winning static line (may extend in future API versions).
      properties:
        config_source:
          $ref: '#/components/schemas/ConfigSource'
          description: Declared winning source for this entity in the static merge.
        layer_detail:
          type: string
          description: |
            Finer sub-classification (e.g. dominant:etcd_grpc, crd/ContractBundle, pool:controller_root, discovery:…).

    EnvironmentMeta:
      type: object
      description: |
        Control-plane metadata for a logical environment, separate from `name`, `bundles`, and `services`
        (materialization generation, static fingerprint, dominant config layer).
      properties:
        provenance:
          $ref: '#/components/schemas/Provenance'
        effective_generation:
          type: integer
          format: int64
          description: Materialized effective document generation when available (controller etcd /effective/.../v1).
        sources_fingerprint:
          type: string
          description: Hex SHA-256 fingerprint of static effective (name, type, bundle/service lists) from the controller.
        environment_type:
          type: string
          description: Environment kind in the effective (e.g. `kubernetes` from K8s discovery, file bootstrap).
        materialized_updated_at:
          type: string
          format: date-time
          description: When the materialized v1 document was last written in controller etcd (if available).
        materialized_schema_version:
          type: integer
          format: int32
          description: schema_version in the materialized v1 document when available.
        materialized_mismatch:
          type: boolean
          description: |
            `true` when the live effective fingerprint (controller merge) does not match the last materialized
            document (reconcile lag or error).

    BundleMeta:
      type: object
      description: Control-plane metadata for a bundle line in the effective environment.
      properties:
        provenance:
          $ref: '#/components/schemas/Provenance'
        resolved_ref:
          type: string
          description: Optional resolved Git identifier (e.g. commit) when the sync pipeline exposes it.
        last_sync_utc:
          type: string
          format: date-time
          description: Optional timestamp of the last successful bundle-to-etcd sync.
        sync_error:
          type: string
          description: Last known sync error for the bundle, if any.
        k8s_resource_ref:
          type: string
          description: K8s object that carried this static line, when from discovery.

    ServiceLineScope:
      type: string
      description: Whether a service line belongs to the per-environment static merge or the controller root pool.
      enum:
        - environment
        - controller_root
        - unspecified

    ServiceMeta:
      type: object
      description: Control-plane metadata for a static service line.
      properties:
        provenance:
          $ref: '#/components/schemas/Provenance'
        k8s_service_ref:
          type: string
          description: Declared or discovered K8s backend reference (format may vary, e.g. `ns/svc` or `GatewayUpstream:...`).

    Bundle:
      type: object
      description: |
        Logical bundle: human-oriented `name` plus `repository`, `ref`, and `path` as reported by controllers.
        Field `key` is the canonical snapshot key (same string as under the etcd `.../snapshots/` prefix),
        i.e. `repository` / escaped `ref` / escaped `path`.
      properties:
        key:
          type: string
          description: Canonical bundle key matching etcd snapshot paths (`repository/escapedRef/escapedPath`).
        name:
          type: string
          description: Display / config name (convenience; not necessarily unique globally).
        repository:
          type: string
        ref:
          type: string
        path:
          type: string
        meta:
          $ref: '#/components/schemas/BundleMeta'
          description: When present, includes `provenance.config_source` (winning static layer for this bundle key).

    Environment:
      type: object
      required:
      - name
      properties:
        name:
          type: string
        meta:
          $ref: '#/components/schemas/EnvironmentMeta'
          description: When present, includes `provenance` (dominant layer for the environment name), `effective_generation`, and `sources_fingerprint`.
        bundles:
          type: array
          items:
            $ref: '#/components/schemas/Bundle'
        services:
          type: array
          items:
            $ref: '#/components/schemas/RegistryService'
          description: Static upstream services in the effective environment (as reported by the controller).

    RegistryService:
      type: object
      required:
      - name
      - upstream
      properties:
        name:
          type: string
          description: Logical service name in the environment.
        upstream:
          type: string
          description: Upstream base URL or host as in controller static config.
        scope:
          $ref: '#/components/schemas/ServiceLineScope'
        meta:
          $ref: '#/components/schemas/ServiceMeta'
          description: |
            When present, includes `provenance.config_source` (winning static layer for this service name: etcd gRPC
            &gt; kubernetes &gt; file, ADR 0001).

    Controller:
      type: object
      required:
      - controller_id
      - tenant
      properties:
        controller_id:
          type: string
        tenant:
          type: string
        registry_payload_version:
          type: integer
          format: int32
          description: DTO / schema version the controller used when last registering (extended meta fields in v1).
        environments:
          type: array
          items:
            $ref: '#/components/schemas/Environment'

    ControllerHeartbeat:
      type: object
      required:
      - timestamp
      properties:
        timestamp:
          type: string
          format: date-time
          description: Last heartbeat time stored for the controller.

    TenantListResponse:
      type: object
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          items:
            type: string
          description: Distinct tenant names.
        next_cursor:
          type: string
          nullable: true
          description: Opaque cursor for the next page; null or omitted when there is no next page.
        has_more:
          type: boolean

    ControllerListResponse:
      type: object
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Controller'
        next_cursor:
          type: string
          nullable: true
          description: Opaque cursor for the next page; null or omitted when there is no next page.
        has_more:
          type: boolean

    EnvironmentListResponse:
      type: object
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Environment'
        next_cursor:
          type: string
          nullable: true
          description: Opaque cursor for the next page; null or omitted when there is no next page.
        has_more:
          type: boolean

    BundleRefListResponse:
      type: object
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Bundle'
        next_cursor:
          type: string
          nullable: true
          description: Opaque cursor for the next page; null or omitted when there is no next page.
        has_more:
          type: boolean

    ContractNameListResponse:
      type: object
      required:
      - items
      - has_more
      properties:
        items:
          type: array
          items:
            type: string
        next_cursor:
          type: string
          nullable: true
          description: Opaque cursor for the next page; null or omitted when there is no next page.
        has_more:
          type: boolean

    ContractDocument:
      type: object
      description: |
        Parsed contract document as JSON (YAML contracts are exposed as a canonical JSON representation).
      additionalProperties: true

    ContractUpstream:
      type: object
      properties:
        name:
          type: string

    App:
      type: object
      properties:
        app_id:
          type: string
        environments:
          type: array
          items:
            type: string

    Access:
      type: object
      properties:
        secure:
          type: boolean
        apps:
          type: array
          items:
            $ref: '#/components/schemas/App'

    ContractSnapshot:
      type: object
      description: Contract routing snapshot (aligns with `merionyx.gateway.common.v1.ContractSnapshot`).
      properties:
        name:
          type: string
        prefix:
          type: string
        upstream:
          $ref: '#/components/schemas/ContractUpstream'
        allow_undefined_methods:
          type: boolean
        access:
          $ref: '#/components/schemas/Access'

    BundleSyncRequest:
      type: object
      required:
      - repository
      - ref
      - bundle
      properties:
        repository:
          type: string
        ref:
          type: string
        bundle:
          type: string
          description: Bundle name / logical bundle identifier (same as Schemas sync RPC).
        force:
          type: boolean
          default: false
          description: If true, synchronize even when etcd already has materialized snapshots.

    BundleSyncResponse:
      type: object
      required:
      - snapshots
      - from_cache
      properties:
        snapshots:
          type: array
          items:
            $ref: '#/components/schemas/ContractSnapshot'
        from_cache:
          type: boolean
          description: True if snapshots were served from etcd cache without a Git fetch.

    StatusResponse:
      type: object
      description: Aggregate health of API Server dependencies (exact fields may evolve).
      required:
      - api_server
      properties:
        api_server:
          type: string
          example: ok
        etcd:
          type: string
          example: ok
        contract_syncer:
          type: string
          example: ok

  responses:
    BadRequest:
      description: Bad request
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotModified:
      description: Not Modified — representation unchanged (use with `If-None-Match`).
    InternalError:
      description: Internal server error
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Unauthorized:
      description: Authentication failed or credentials are missing.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Conflict:
      description: Request conflicts with current state (e.g. lost etcd CAS / concurrent refresh).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

paths:
  /health:
    get:
      tags: [ System ]
      operationId: getHealth
      security: []
      summary: Liveness
      description: |
        **Liveness only:** returns `{ "status": "ok" }` when the process accepts HTTP — does **not** verify etcd or Contract Syncer.
        For readiness (dependencies), use `GET /ready`.
      responses:
        '200':
          description: Service is running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
        '400':
          $ref: '#/components/responses/BadRequest'

  /ready:
    get:
      tags: [ System ]
      operationId: getReady
      security: []
      summary: Readiness
      description: |
        **Readiness probe:** verifies **etcd** (required). **Contract Syncer** is included only when the server is configured
        with `readiness.require_contract_syncer: true` (otherwise reported as `skipped` and not required to pass).
        Returns **503** when not ready so orchestrators can stop sending traffic.
      responses:
        '200':
          description: Ready to serve traffic
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessStatus'
        '503':
          description: Not ready (required dependency check failed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessStatus'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/version:
    get:
      tags: [ System ]
      operationId: getVersion
      security: []
      summary: Build and API schema version
      description: |
        Returns git revision, build time, embedded OpenAPI `info.version`, and optional release tag — useful to see **which binary** answers in multi-replica setups.
      responses:
        '200':
          description: Version metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /.well-known/jwks.json:
    get:
      tags: [ Authentication ]
      operationId: getJwks
      security: []
      summary: JSON Web Key Set (JWKS) — API profile
      description: |
        Public keys for verifying **API profile** JWTs minted for HTTP calls to this API Server (`iss` / `aud` / `kid` for the API surface). Supports conditional requests via `ETag` / `If-None-Match`. **Not** for Edge / data-plane tokens — use `/.well-known/jwks-edge.json`.
      parameters:
      - $ref: '#/components/parameters/IfNoneMatch'
      responses:
        '200':
          description: JWKS document
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Jwks'
        '304':
          $ref: '#/components/responses/NotModified'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

